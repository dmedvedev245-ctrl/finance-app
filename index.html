<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Финансы">
<title>Финансы</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0d1117;--surface:#13192a;--card:#17202f;--card2:#1c2538;--border:#242d40;--border2:#2e3a50;
  --blue:#6b9fff;--teal:#4db8c8;--amber:#e8a84a;--rose:#d4738a;--sage:#5cb88a;--lav:#8b8dce;
  --red:#c96060;--red-bg:#1e1418;--green-bg:#111c16;--yel:#c9a84a;--yel-bg:#1c1810;
  --text:#c8d4e8;--text2:#8a9ab8;--muted:#4a5a78;
  --nav:58px;--safe:env(safe-area-inset-bottom,0px);--r:13px;
}
body{font-family:'Manrope',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
.app{max-width:420px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
.hdr{padding:46px 16px 12px;border-bottom:1px solid var(--border);background:rgba(13,17,23,.96);backdrop-filter:blur(20px);position:sticky;top:0;z-index:50;}
.hdr-row{display:flex;justify-content:space-between;align-items:flex-end;}
.hdr-lbl{font-size:9px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:2px;font-weight:700;}
.hdr-title{font-size:19px;font-weight:800;color:var(--text);letter-spacing:-.02em;}
.hdr-val{font-size:16px;font-weight:700;color:var(--red);}
.content{flex:1;overflow-y:auto;padding:12px 14px calc(var(--nav) + var(--safe) + 12px);}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;background:rgba(13,17,23,.97);backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe);z-index:100;}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;padding:5px 2px;background:none;border:none;cursor:pointer;color:var(--muted);font-size:8px;font-family:inherit;min-height:var(--nav);transition:color .2s;font-weight:700;}
.nb.on{color:var(--blue);}
.nb .ic{font-size:17px;line-height:1;margin-bottom:1px;}
.card{background:var(--card);border-radius:var(--r);padding:13px 14px;border:1px solid var(--border);margin-bottom:9px;}
.stl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:11px;display:flex;align-items:center;gap:5px;}
.stl-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.sgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:9px;}
.sbox{background:var(--surface);border-radius:9px;padding:9px 6px;border:1px solid var(--border);text-align:center;}
.sl{font-size:7px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;font-weight:700;}
.sv{font-size:10px;font-weight:700;line-height:1.2;}
.badge{display:inline-block;font-size:8px;font-weight:800;padding:2px 7px;border-radius:5px;letter-spacing:.05em;text-transform:uppercase;}
.stabs{display:flex;gap:3px;margin-bottom:11px;background:var(--surface);padding:3px;border-radius:9px;}
.stab{flex:1;padding:7px 3px;border-radius:7px;border:none;background:transparent;color:var(--muted);font-size:10px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit;}
.stab.on{background:var(--card2);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.4);}
.li{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--border);}
.li:last-child{border-bottom:none;padding-bottom:0;}
input,select,textarea{background:var(--surface);border:1px solid var(--border2);border-radius:9px;padding:10px 11px;color:var(--text);font-size:14px;outline:none;width:100%;font-family:inherit;-webkit-appearance:none;appearance:none;transition:border-color .2s;}
input:focus,select:focus,textarea:focus{border-color:var(--blue);}
textarea{resize:vertical;min-height:80px;}
.ig{margin-bottom:9px;}
.ilbl{font-size:10px;color:var(--muted);margin-bottom:4px;display:block;font-weight:700;letter-spacing:.03em;}
.btn{padding:11px 16px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s,transform .1s;}
.btn:active{opacity:.8;transform:scale(.98);}
.bprimary{background:var(--blue);color:#0d1117;}
.boutline{background:transparent;border:1px solid var(--border2);color:var(--text2);}
.bsm{padding:6px 12px;font-size:11px;border-radius:8px;}
.bdanger{background:var(--red-bg);color:var(--red);border:1px solid transparent;}
.bghost{background:var(--surface);color:var(--text2);border:1px solid var(--border);}
.bsage{background:var(--green-bg);color:var(--sage);border:1px solid transparent;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .15s;}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 16px calc(env(safe-area-inset-bottom,0px) + 20px);width:100%;max-width:420px;max-height:88vh;overflow-y:auto;animation:slideUp .2s;border-top:1px solid var(--border2);}
.mtitle{font-size:15px;font-weight:800;margin-bottom:16px;text-align:center;}
.mbtns{display:flex;gap:7px;margin-top:16px;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(28px);opacity:0}to{transform:translateY(0);opacity:1}}
.pbar{background:var(--border);border-radius:4px;height:4px;overflow:hidden;margin-top:5px;}
.pfill{height:100%;border-radius:4px;transition:width .5s;}
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--border2);border-radius:10px;padding:8px 16px;font-size:12px;font-weight:600;z-index:999;white-space:nowrap;pointer-events:none;animation:toastAnim 2.6s forwards;color:var(--text);box-shadow:0 8px 24px rgba(0,0,0,.4);}
@keyframes toastAnim{0%{opacity:0;transform:translateX(-50%) translateY(-6px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}75%{opacity:1}100%{opacity:0}}
.alert{display:flex;align-items:center;gap:9px;padding:10px 11px;border-radius:10px;margin-bottom:6px;font-size:12px;font-weight:500;}
.ared{background:var(--red-bg);border:1px solid #c9606033;}
.ayellow{background:var(--yel-bg);border:1px solid #c9a84a33;}
.agreen{background:var(--green-bg);border:1px solid #5cb88a33;}
.titem{display:flex;gap:11px;padding-bottom:14px;position:relative;}
.titem::before{content:'';position:absolute;left:13px;top:28px;bottom:0;width:1px;background:var(--border);}
.titem:last-child::before{display:none;}
.tdot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;z-index:1;}
.tbody{flex:1;padding-top:3px;}
.div{height:1px;background:var(--border);margin:9px 0;}
.row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;}
.rl{font-size:12px;color:var(--text2);}
.rv{font-size:13px;font-weight:700;}
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;}
.empty{text-align:center;color:var(--muted);font-size:13px;padding:24px;line-height:2.2;font-weight:500;}
.step-card{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--border);}
.step-card:last-child{border-bottom:none;}
.step-num{width:28px;height:28px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;}
.nc-btn{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .15s;flex-shrink:0;}
.nc-btn.sel{border-color:var(--text);}
.cat-pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;cursor:pointer;transition:opacity .15s;}
/* PRINT */
@media print{
  .bnav,.hdr{display:none!important;}
  .content{padding:0!important;}
  body{background:#fff!important;color:#000!important;}
  .card{background:#f8f9fa!important;border:1px solid #dee2e6!important;break-inside:avoid;}
}
</style>
</head>
<body>
<div class="app">
  <header class="hdr">
    <div class="hdr-row">
      <div><div class="hdr-lbl">Дашборд</div><div class="hdr-title" id="htitle">Обзор</div></div>
      <div style="text-align:right;"><div class="hdr-lbl">Кредитный долг</div><div class="hdr-val" id="hdebt">—</div></div>
    </div>
  </header>
  <main class="content" id="content"></main>
  <nav class="bnav">
    <button class="nb on" data-t="home"    onclick="go('home')">   <span class="ic">⊙</span>Главная</button>
    <button class="nb"    data-t="debts"   onclick="go('debts')">  <span class="ic">◈</span>Долги</button>
    <button class="nb"    data-t="advisor" onclick="go('advisor')"><span class="ic">💡</span>Советник</button>
    <button class="nb"    data-t="tracker" onclick="go('tracker')"><span class="ic">📅</span>Трекер</button>
    <button class="nb"    data-t="charts"  onclick="go('charts')"> <span class="ic">◫</span>Графики</button>
    <button class="nb"    data-t="extra"   onclick="go('extra')">  <span class="ic">≡</span>Ещё</button>
  </nav>
</div>
<div id="mc"></div>
<script>
const CC=['#6b9fff','#e8a84a','#4db8c8','#5cb88a','#d4738a','#8b8dce'];
const CATS=['🍕 Еда','🚗 Транспорт','🎮 Развлечения','👕 Одежда','🏠 ЖКХ','💊 Здоровье','📦 Прочее'];
const NOTE_COLORS=['#6b9fff','#5cb88a','#e8a84a','#c96060','#d4738a','#8b8dce','#4db8c8'];

const DEF={
  credits:[
    {id:1,name:'Т-банк карта',  balance:127913.80,rate:39.9, payment:10233,rday:8,  graceEnd:'2026-07-02',graceRate:0,  color:'#6b9fff',goal:''},
    {id:2,name:'Альфа карта',   balance:56858,    rate:58.49,payment:4549, rday:7,  graceEnd:'2026-07-07',graceRate:0,  color:'#e8a84a',goal:''},
    {id:3,name:'Сбер карта',    balance:60924.49, rate:25.4, payment:1828, rday:0,  graceEnd:'',          graceRate:25.4,color:'#4db8c8',goal:''},
    {id:4,name:'Яндекс Сплит',  balance:31178.09, rate:0,    payment:2179, rday:6,  graceEnd:'2028-03-06',graceRate:0,  color:'#5cb88a',goal:'2028-03-06'},
  ],
  freeDebts:[
    {id:1,name:'Мама',  amount:1700000,urg:'low'},
    {id:2,name:'Общий', amount:70000,  urg:'medium'},
  ],
  income:{salary:95000,card:0,cash:0,incoming:0},
  expenses:[
    {id:1,name:'Продукты',amt:0},{id:2,name:'Аренда',amt:0},{id:3,name:'Транспорт',amt:0},
  ],
  history:[],debtors:[],notes:[],
  tracker:{entries:[],limits:{}},
};

let S=loadState(), TAB='home', STAB={debts:'credits',advisor:'plan',extra:'history'};
function loadState(){try{const s=localStorage.getItem('fin_v6');if(s)return JSON.parse(s);}catch(e){}return JSON.parse(JSON.stringify(DEF));}
function save(){localStorage.setItem('fin_v6',JSON.stringify(S));}

const f=n=>new Intl.NumberFormat('ru-RU').format(Math.round(n));
const fd=d=>d?new Date(d+'T12:00').toLocaleDateString('ru-RU',{day:'numeric',month:'short',year:'numeric'}):'';
const fds=d=>d?new Date(d+'T12:00').toLocaleDateString('ru-RU',{day:'numeric',month:'short'}):'';
const today=()=>new Date().toISOString().slice(0,10);
const uid=()=>Date.now()+Math.random();
const daysLeft=d=>{if(!d)return null;return Math.ceil((new Date(d+'T12:00')-new Date())/86400000);};

function months(bal,rate,pay){
  const r=rate/100/12;
  if(bal<=0)return 0;
  if(r===0)return pay>0?Math.ceil(bal/pay):Infinity;
  if(pay<=bal*r)return Infinity;
  return Math.ceil(-Math.log(1-(bal*r)/pay)/Math.log(1+r));
}
function prio(rate){
  if(rate>=40)return{lbl:'Срочно',  c:'#c96060',bg:'var(--red-bg)'};
  if(rate>=20)return{lbl:'Скоро',   c:'#c9a84a',bg:'var(--yel-bg)'};
  if(rate>0)  return{lbl:'Умеренно',c:'#6b9fff',bg:'#0f1b2e'};
  return             {lbl:'Рассрочка',c:'#5cb88a',bg:'var(--green-bg)'};
}
const URG={high:{lbl:'Срочно',c:'#c96060',bg:'var(--red-bg)'},medium:{lbl:'Скоро',c:'#c9a84a',bg:'var(--yel-bg)'},low:{lbl:'Подождёт',c:'#5cb88a',bg:'var(--green-bg)'}};

function totals(){
  const cd=S.credits.reduce((s,c)=>s+c.balance,0);
  const fd2=S.freeDebts.reduce((s,d)=>s+d.amount,0);
  const py=S.credits.reduce((s,c)=>s+c.payment,0);
  const ic=Object.values(S.income).reduce((s,v)=>s+v,0);
  const ex=S.expenses.reduce((s,e)=>s+e.amt,0);
  const dt=S.debtors.reduce((s,d)=>s+(d.amount-(d.paid||0)),0);
  return{cd,fd:fd2,tot:cd+fd2,py,ic,ex,dt,rem:ic-ex-py};
}

const TITLES={home:'Обзор',debts:'Мои долги',advisor:'Советник',tracker:'Трекер расходов',charts:'Графики',extra:'Ещё'};
function go(t){TAB=t;document.querySelectorAll('.nb').forEach(b=>b.classList.toggle('on',b.dataset.t===t));document.getElementById('htitle').textContent=TITLES[t]||t;render();}

function render(){
  const T=totals();
  document.getElementById('hdebt').textContent=`−${f(T.cd)} ₽`;
  const c=document.getElementById('content');
  if(TAB==='home')   c.innerHTML=rHome(T);
  if(TAB==='debts')  c.innerHTML=rDebts(T);
  if(TAB==='advisor')c.innerHTML=rAdvisor(T);
  if(TAB==='tracker')c.innerHTML=rTracker();
  if(TAB==='charts') c.innerHTML=rCharts(T);
  if(TAB==='extra')  c.innerHTML=rExtra();
}

// ══════════════════════════════════════
// HOME
// ══════════════════════════════════════
function rHome(T){
  const dd=new Date().getDate();
  const grace=S.credits.filter(c=>c.balance>0&&c.graceEnd&&daysLeft(c.graceEnd)>0&&c.graceRate===0&&c.rate>0)
    .sort((a,b)=>daysLeft(a.graceEnd)-daysLeft(b.graceEnd));
  const alerts=S.credits.filter(c=>c.balance>0&&c.rday).flatMap(c=>{
    const diff=c.rday-dd;
    if(diff===0)return[{cls:'ared',ico:'●',msg:`Сегодня платёж — ${c.name}: ${f(c.payment)} ₽`,id:c.id}];
    if(diff>0&&diff<=3)return[{cls:'ayellow',ico:'○',msg:`Через ${diff} дн. — ${c.name}`,id:c.id}];
    if(diff<0&&diff>=-2)return[{cls:'ared',ico:'▲',msg:`Просрочен — ${c.name}`,id:c.id}];
    return[];
  });
  const totInt=S.credits.reduce((s,c)=>s+c.balance*(c.graceRate||c.rate)/100/12,0);

  return`
  ${grace.map(c=>{
    const dl=daysLeft(c.graceEnd);
    const hot=dl<=7;
    return`<div class="card" style="border-color:${hot?'#c96060':'#c9a84a'}55;background:${hot?'var(--red-bg)':'var(--yel-bg)'};">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div><div style="font-size:9px;color:${hot?'var(--red)':'var(--yel)'};font-weight:700;letter-spacing:.08em;text-transform:uppercase;">🔔 БП · ${c.name}</div>
        <div style="font-size:13px;font-weight:700;margin-top:3px;">Закрыть <span style="color:var(--red);">${f(c.balance)} ₽</span> до ${fd(c.graceEnd)}</div></div>
        <div style="text-align:center;flex-shrink:0;margin-left:10px;"><div style="font-size:32px;font-weight:800;color:${hot?'var(--red)':'var(--yel)'};">${dl}</div><div style="font-size:8px;color:var(--muted);font-weight:700;">ДНЕЙ</div></div>
      </div>
      <div style="display:flex;gap:6px;">
        <button class="btn bprimary bsm" style="flex:1;" onclick="openPay(${c.id})">Внести платёж</button>
        <div style="font-size:10px;color:${hot?'var(--red)':'var(--yel)'};font-weight:600;display:flex;align-items:center;padding:0 4px;">После: ${c.rate}%</div>
      </div>
    </div>`;
  }).join('')}

  ${alerts.length?`<div class="card" style="border-color:#c9606033;"><div class="stl"><div class="stl-dot" style="background:var(--red);"></div>Платежи</div>${alerts.map(a=>`<div class="alert ${a.cls}"><span style="font-size:10px;color:${a.cls==='ared'?'var(--red)':'var(--yel)'};">${a.ico}</span><span style="flex:1;color:var(--text2);">${a.msg}</span><button class="btn bprimary bsm" onclick="openPay(${a.id})">Платёж</button></div>`).join('')}</div>`:''}

  <div class="sgrid">
    <div class="sbox"><div class="sl">Кредиты</div><div class="sv" style="color:var(--red);">−${f(T.cd)} ₽</div></div>
    <div class="sbox"><div class="sl">Долги б/п</div><div class="sv" style="color:var(--amber);">−${f(T.fd)} ₽</div></div>
    <div class="sbox"><div class="sl">Мне должны</div><div class="sv" style="color:var(--sage);">+${f(T.dt)} ₽</div></div>
    <div class="sbox"><div class="sl">ЗП (5 числа)</div><div class="sv" style="color:var(--teal);">+${f(T.ic)} ₽</div></div>
    <div class="sbox"><div class="sl">Платежи</div><div class="sv" style="color:var(--rose);">−${f(T.py)} ₽</div></div>
    <div class="sbox"><div class="sl">Остаток</div><div class="sv" style="color:${T.rem>=0?'var(--sage)':'var(--red)'};">${T.rem>=0?'+':''}${f(T.rem)} ₽</div></div>
  </div>

  <div class="card" style="background:var(--surface);">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <div><div style="font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.08em;text-transform:uppercase;">Ежемесячно банкам</div><div style="font-size:22px;font-weight:800;color:var(--red);letter-spacing:-.03em;margin-top:3px;">${f(totInt)} ₽</div></div>
      <div style="text-align:right;"><div style="font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.08em;text-transform:uppercase;">В год</div><div style="font-size:16px;font-weight:700;color:var(--amber);margin-top:3px;">${f(totInt*12)} ₽</div></div>
    </div>
  </div>

  <div class="card">
    <div class="stl"><div class="stl-dot" style="background:var(--amber);"></div>Приоритет закрытия</div>
    ${[...S.credits].sort((a,b)=>{
      const ra=daysLeft(a.graceEnd)>0?a.rate+100:a.rate;
      const rb=daysLeft(b.graceEnd)>0?b.rate+100:b.rate;
      return rb-ra;
    }).map((c,i)=>{
      const eff=c.graceEnd&&daysLeft(c.graceEnd)>0?0:(c.graceRate||c.rate);
      const p=prio(c.rate);const mo=months(c.balance,eff,c.payment);
      const int=Math.round(c.balance*eff/100/12);const dl=c.graceEnd?daysLeft(c.graceEnd):null;
      return`<div class="li">
        <div style="width:24px;height:24px;border-radius:7px;background:${p.bg};color:${p.c};font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${i+1}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:13px;font-weight:700;">${c.name}</div>
          <div style="font-size:10px;color:var(--muted);">${c.rate}% · ${f(c.balance)} ₽${dl!==null&&dl>0?' · БП '+dl+' дн.':''}</div>
        </div>
        <div style="text-align:right;flex-shrink:0;">
          ${int>0?`<div style="font-size:10px;color:var(--red);font-weight:600;">−${f(int)}/мес</div>`:
          `<div style="font-size:10px;color:var(--sage);font-weight:600;">0%</div>`}
          <span class="badge" style="background:${p.bg};color:${p.c};margin-top:2px;">${p.lbl}</span>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

// ══════════════════════════════════════
// DEBTS
// ══════════════════════════════════════
function rDebts(T){
  const s=STAB.debts;
  return`<div class="stabs">
    <button class="stab ${s==='credits'?'on':''}" onclick="setST('debts','credits')">Кредиты</button>
    <button class="stab ${s==='free'?'on':''}"    onclick="setST('debts','free')">Без %</button>

function rPlan(T){
  const now=new Date();
  const steps=[];
  // Grace items sorted by urgency
  const graceItems=S.credits.filter(c=>c.balance>0&&c.graceEnd&&daysLeft(c.graceEnd)>0&&c.rate>0)
    .sort((a,b)=>daysLeft(a.graceEnd)-daysLeft(b.graceEnd));
  // Paid items
  const paidItems=S.credits.filter(c=>c.balance>0&&(!c.graceEnd||daysLeft(c.graceEnd)<=0)&&(c.graceRate||c.rate)>0)
    .sort((a,b)=>b.rate-a.rate);

  const ic=Object.values(S.income).reduce((s,v)=>s+v,0);
  const ex=S.expenses.reduce((s,e)=>s+e.amt,0);
  const py=S.credits.reduce((s,c)=>s+c.payment,0);
  const free=Math.max(0,ic-ex-py);

  let stepN=1;
  graceItems.forEach(c=>{
    const dl=daysLeft(c.graceEnd);
    const savPerMo=Math.round(c.balance*c.rate/100/12);
    steps.push({
      n:stepN++,hot:dl<=10,
      icon:dl<=10?'🔴':'🟡',
      color:dl<=10?'var(--red)':'var(--yel)',
      bg:dl<=10?'var(--red-bg)':'var(--yel-bg)',

      body:`Нужно внести ${f(c.balance)} ₽ · осталось ${dl} дней`,
      gain:`💰 Сэкономишь ~${f(savPerMo)} ₽/мес — ставка ${c.rate}% не включится`
    });
  });
  paidItems.forEach(c=>{
    const int=Math.round(c.balance*(c.graceRate||c.rate)/100/12);
    const mo=months(c.balance,c.graceRate||c.rate,c.payment);
    steps.push({
      n:stepN++,hot:false,
      icon:'🔵',color:'var(--blue)',bg:'#0f1b2e',
      title:`Гасить ${c.name} (${c.graceRate||c.rate}%)`,

      gain:free>0?`При доплате ${f(free)} ₽/мес — закроешь на ~${Math.round(mo*c.payment/(c.payment+free)*0.7)} мес. раньше`:''
    });

  const freeStr=S.freeDebts.filter(d=>d.urg!=='low').sort((a,b)=>({high:2,medium:1}[b.urg]||0)-({high:2,medium:1}[a.urg]||0));

      n:stepN++,hot:d.urg==='high',
      icon:'⚪',color:'var(--amber)',bg:'var(--yel-bg)',
      title:`Вернуть — ${d.name}`,
      body:`${f(d.amount)} ₽ · ${URG[d.urg].lbl}`,
      gain:''
    });
  });

  return`<div class="card" style="border-color:var(--blue)33;">
    <div class="stl"><div class="stl-dot" style="background:var(--blue);"></div>Персональный план действий</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:14px;font-weight:500;">На основе твоих данных · обновляется автоматически</div>
    ${steps.map(s=>`<div class="step-card">
      <div class="step-num" style="background:${s.bg};color:${s.color};">${s.n}</div>
      <div style="flex:1;">
        <div style="font-size:13px;font-weight:700;color:${s.color};">${s.icon} ${s.title}</div>

    </div>`).join('')}
  </div>
  ${free>0?`<div class="card" style="border-color:var(--sage)33;"><div class="stl"><div class="stl-dot" style="background:var(--sage);"></div>Свободные деньги</div>

      <div style="font-size:12px;color:var(--text2);">Доход − расходы − платежи</div>

    <div style="font-size:11px;color:var(--muted);margin-top:6px;">Направь их на кредит с наибольшей ставкой — это максимальная экономия</div>

function rCalc(){
  const cid=window._calcCid||S.credits[0]?.id;
  const c=S.credits.find(x=>x.id==cid)||S.credits[0];
  if(!c)return`<div class="empty">Нет кредитов</div>`;
  const extra=window._calcExtra||0;
  const effRate=c.graceEnd&&daysLeft(c.graceEnd)>0?0:(c.graceRate||c.rate);
  const moBase=months(c.balance,effRate,c.payment);
  const moNew=extra>0?months(c.balance,effRate,c.payment+extra):moBase;
  const moSaved=isFinite(moBase)&&isFinite(moNew)?moBase-moNew:0;
  const intBase=isFinite(moBase)?Math.max(0,c.payment*moBase-c.balance):0;
  const intNew=isFinite(moNew)?Math.max(0,(c.payment+extra)*moNew-c.balance):0;
  const saved=Math.max(0,intBase-intNew-(extra*moSaved));

  return`<div class="card">
    <div class="stl"><div class="stl-dot" style="background:var(--lav);"></div>Выбери кредит</div>
    <select onchange="window._calcCid=this.value;window._calcExtra=0;render();" style="margin-bottom:12px;">
      ${S.credits.map(x=>`<option value="${x.id}" ${x.id==cid?'selected':''}>${x.name} — ${f(x.balance)} ₽</option>`).join('')}
    </select>
    <div class="ig"><label class="ilbl">Дополнительная сумма в месяц (₽)</label>
      <input type="number" value="${extra||''}" placeholder="5000" oninput="window._calcExtra=parseFloat(this.value)||0;debounceRender();">
    </div>
  </div>

  <div class="card">
    <div class="stl"><div class="stl-dot" style="background:var(--blue);"></div>Текущий план</div>
    <div class="row"><span class="rl">Платёж</span><span class="rv">${f(c.payment)} ₽/мес</span></div>
    <div class="row"><span class="rl">Закроешь через</span><span class="rv" style="color:var(--amber);">${isFinite(moBase)?moBase+' мес.':'∞'}</span></div>
    <div class="row"><span class="rl">Переплата банку</span><span class="rv" style="color:var(--red);">${isFinite(moBase)?f(intBase)+' ₽':'∞'}</span></div>
  </div>

  ${extra>0?`<div class="card" style="border-color:var(--sage)33;">
    <div class="stl"><div class="stl-dot" style="background:var(--sage);"></div>С доплатой +${f(extra)} ₽/мес</div>
    <div class="row"><span class="rl">Новый платёж</span><span class="rv" style="color:var(--blue);">${f(c.payment+extra)} ₽/мес</span></div>
    <div class="row"><span class="rl">Закроешь через</span><span class="rv" style="color:var(--sage);">${isFinite(moNew)?moNew+' мес.':'∞'}</span></div>
    <div class="row"><span class="rl">Сэкономишь на %</span><span class="rv" style="color:var(--sage);">~${f(saved)} ₽</span></div>
    <div class="row"><span class="rl">Быстрее на</span><span class="rv" style="color:var(--sage);">${moSaved} мес.</span></div>
    <div class="pbar" style="margin-top:10px;height:6px;">
      <div class="pfill" style="width:${isFinite(moBase)&&moBase>0?Math.min(100,moSaved/moBase*100):0}%;background:var(--sage);"></div>
    </div>
    <div style="font-size:10px;color:var(--muted);margin-top:4px;font-weight:600;">На ${Math.round(isFinite(moBase)&&moBase>0?moSaved/moBase*100:0)}% быстрее</div>
  </div>`:`<div class="card" style="background:var(--surface);"><div class="empty" style="padding:14px;">👆 Введи доплату — увидишь сколько сэкономишь</div></div>`}`;
}

let _renderTimer;
function debounceRender(){clearTimeout(_renderTimer);_renderTimer=setTimeout(render,300);}

function rScenarios(T){
  const ic=Object.values(S.income).reduce((s,v)=>s+v,0);
  const ex=S.expenses.reduce((s,e)=>s+e.amt,0);
  const minPay=S.credits.reduce((s,c)=>s+c.payment,0);
  const extra=Math.max(0,ic-ex-minPay);

  function simulate(strategy){
    let cr=S.credits.filter(c=>c.balance>0).map(c=>({...c}));
    let totalInt=0,mo=0;
    while(cr.some(c=>c.balance>0)&&mo<240){
      mo++;
      // Apply interest
      cr=cr.map(c=>{
        if(c.balance<=0)return c;
        const r=(c.graceRate||c.rate)/100/12;
        const i=c.balance*r;
        totalInt+=i;
        return{...c,balance:c.balance+i};
      });
      // Pay minimums
      cr=cr.map(c=>{
        if(c.balance<=0)return c;
        const p=Math.min(c.balance,c.payment);
        return{...c,balance:c.balance-p};
      });
      // Apply extra based on strategy
      let remaining=extra;
      let targets;
      if(strategy==='avalanche') targets=[...cr].filter(c=>c.balance>0).sort((a,b)=>(b.graceRate||b.rate)-(a.graceRate||a.rate));
      else if(strategy==='snowball') targets=[...cr].filter(c=>c.balance>0).sort((a,b)=>a.balance-b.balance);
      else if(strategy==='grace'){
        const g=cr.filter(c=>c.balance>0&&c.graceEnd&&daysLeft(c.graceEnd)>0).sort((a,b)=>daysLeft(a.graceEnd)-daysLeft(b.graceEnd));
        targets=g.length>0?g:[...cr].filter(c=>c.balance>0).sort((a,b)=>(b.graceRate||b.rate)-(a.graceRate||a.rate));
      }
      if(targets)for(const t of targets){if(remaining<=0)break;const pay=Math.min(t.balance,remaining);cr=cr.map(c=>c.id===t.id?{...c,balance:c.balance-pay}:c);remaining-=pay;}
    }
    return{mo,totalInt:Math.round(totalInt)};
  }

  const s1=simulate('minimum');
  const s2=simulate('avalanche');
  const s3=simulate('grace');

  const bestMo=Math.min(s1.mo,s2.mo,s3.mo);
  const worstInt=Math.max(s1.totalInt,s2.totalInt,s3.totalInt);

  const rows=[
    {name:'Только минимум',mo:s1.mo,int:s1.totalInt,color:'var(--red)',desc:'Платишь ровно столько сколько требует банк'},
    {name:'Лавина (высокий % первым)',mo:s2.mo,int:s2.totalInt,color:'var(--blue)',desc:'Лишние деньги → на самый дорогой кредит'},
    {name:'БП сначала',mo:s3.mo,int:s3.totalInt,color:'var(--sage)',desc:'Сначала закрыть льготные периоды'},
  ];

  return`<div style="font-size:11px;color:var(--muted);margin-bottom:10px;font-weight:500;">Свободно сверх минимума: <b style="color:var(--teal);">+${f(extra)} ₽/мес</b></div>
  ${rows.map((r,i)=>`<div class="card" style="${r.mo===bestMo?'border-color:'+r.color+'44;':''}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
      <div><div style="font-size:13px;font-weight:800;color:${r.color};">${r.name}</div>
      <div style="font-size:10px;color:var(--muted);margin-top:3px;">${r.desc}</div></div>
      ${r.mo===bestMo?`<span class="badge" style="background:var(--green-bg);color:var(--sage);flex-shrink:0;margin-left:8px;">ЛУЧШИЙ</span>`:''}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
      <div class="sbox"><div class="sl">Закроешь через</div><div class="sv" style="color:${r.color};">${r.mo} мес.</div></div>
      <div class="sbox"><div class="sl">Переплата</div><div class="sv" style="color:var(--amber);">${f(r.totalInt)} ₽</div></div>
    </div>
    ${i>0?`<div style="font-size:10px;color:var(--sage);margin-top:8px;font-weight:600;">💰 Экономия vs минимума: ${f(s1.totalInt-r.totalInt)} ₽ · на ${s1.mo-r.mo} мес. быстрее</div>`:''}
  </div>`).join('')}`;
}

// ══════════════════════════════════════
// TRACKER
// ══════════════════════════════════════
function rTracker(){
  if(!S.tracker)S.tracker={entries:[],limits:{}};
  const ym=new Date().toISOString().slice(0,7);
  const entries=S.tracker.entries||[];
  const monthEntries=entries.filter(e=>e.date.startsWith(ym));
  const total=monthEntries.reduce((s,e)=>s+e.amt,0);
  const byCat={};
  CATS.forEach(c=>{byCat[c]=monthEntries.filter(e=>e.cat===c).reduce((s,e)=>s+e.amt,0);});
  const maxCat=Math.max(...Object.values(byCat),1);
  const today7=entries.filter(e=>daysLeft(e.date)>=-7&&daysLeft(e.date)<=0).sort((a,b)=>b.date.localeCompare(a.date));

  return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
    <div><div style="font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.08em;text-transform:uppercase;">Расходы в этом месяце</div>
    <div style="font-size:22px;font-weight:800;color:var(--rose);">−${f(total)} ₽</div></div>
    <button class="btn bprimary bsm" onclick="openAddEntry()">+ Расход</button>
  </div>

  <div class="card">
    <div class="stl"><div class="stl-dot" style="background:var(--rose);"></div>По категориям</div>
    ${CATS.map(cat=>{
      const amt=byCat[cat]||0;
      const lim=S.tracker.limits[cat]||0;
      const over=lim>0&&amt>lim;
      const pct=lim>0?Math.min(100,amt/lim*100):amt>0?(amt/maxCat*100):0;
      return`<div style="margin-bottom:11px;">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;">
          <span style="font-weight:600;">${cat}</span>
          <span style="color:${over?'var(--red)':'var(--text2)'};">${f(amt)} ₽${lim>0?' / '+f(lim):''}</span>
        </div>
        <div style="background:var(--border);border-radius:4px;height:4px;overflow:hidden;">
          <div style="width:${pct}%;height:100%;background:${over?'var(--red)':'var(--rose)'};border-radius:4px;transition:width .4s;"></div>
        </div>
      </div>`;
    }).join('')}
    <button class="btn bghost bsm" style="width:100%;margin-top:4px;" onclick="openLimits()">⚙️ Лимиты по категориям</button>
  </div>

  ${today7.length>0?`<div class="card">
    <div class="stl"><div class="stl-dot" style="background:var(--lav);"></div>Последние записи</div>
    ${today7.slice(0,15).map(e=>`<div class="li">
      <div style="flex:1;"><div style="font-size:12px;font-weight:700;">${e.cat}</div>${e.note?`<div style="font-size:10px;color:var(--muted);">${e.note}</div>`:''}</div>
      <div style="text-align:right;flex-shrink:0;"><div style="font-size:13px;font-weight:700;color:var(--rose);">−${f(e.amt)} ₽</div><div style="font-size:10px;color:var(--muted);">${fds(e.date)}</div></div>
      <button onclick="delEntry(${e.id})" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;line-height:1;padding:0 2px;">×</button>
    </div>`).join('')}
  </div>`:'<div class="card"><div class="empty">Нет записей<br><span style="font-size:11px;">Нажми «+ Расход» чтобы начать</span></div></div>'}`;
}

// ══════════════════════════════════════
// CHARTS
// ══════════════════════════════════════
function rCharts(T){
  const cr=S.credits.filter(c=>c.balance>0);
  const tot=cr.reduce((s,c)=>s+c.balance,0);
  let cumP=0,parts='';
  cr.forEach((c,i)=>{const p=(c.balance/tot)*100;parts+=`${c.color||CC[i]} ${cumP}% ${cumP+p}%,`;cumP+=p;});
  if(parts)parts=parts.slice(0,-1);
  let rem=cr.map(c=>({...c}));const fc=[];
  for(let m=0;m<=72;m++){const t=rem.reduce((s,c)=>s+Math.max(0,c.balance),0);fc.push(t);if(t<=0)break;rem=rem.map(c=>{if(c.balance<=0)return c;const r=(c.graceRate||c.rate)/100/12;const i=c.balance*r;return{...c,balance:Math.max(0,c.balance-Math.max(0,c.payment-i))};});}
  const fcMo=fc.length-1,svgW=340,svgH=90,mxF=Math.max(...fc,1);
  const pts=fc.map((v,i)=>{const x=(i/Math.max(fc.length-1,1))*(svgW-20)+10,y=svgH-10-((v/mxF)*(svgH-20));return`${x},${y}`;}).join(' ');
  const totInt=cr.reduce((s,c)=>s+c.balance*(c.graceRate||c.rate)/100/12,0);
  const maxP=Math.max(...cr.map(c=>c.payment),1);
  return`
  <div class="card"><div class="stl"><div class="stl-dot" style="background:var(--blue);"></div>Структура долга</div>
    <div style="display:flex;align-items:center;gap:14px;">
      <div style="width:90px;height:90px;border-radius:50%;background:conic-gradient(${parts||'var(--border) 0% 100%'});flex-shrink:0;position:relative;"><div style="position:absolute;inset:13px;border-radius:50%;background:var(--card);"></div></div>
      <div style="flex:1;display:flex;flex-direction:column;gap:7px;">${cr.map((c,i)=>{const p=tot>0?Math.round(c.balance/tot*100):0;return`<div style="display:flex;justify-content:space-between;"><div style="display:flex;align-items:center;gap:6px;font-size:11px;"><div style="width:7px;height:7px;border-radius:2px;background:${c.color||CC[i]};"></div><span style="color:var(--text2);font-weight:600;">${c.name}</span></div><span style="font-size:11px;font-weight:700;">${p}%</span></div>`;}).join('')}</div>
    </div>
    <div style="margin-top:9px;font-size:11px;color:var(--muted);font-weight:600;text-align:center;">Итого: ${f(T.cd)} ₽</div>
  </div>
  <div class="card"><div class="stl"><div class="stl-dot" style="background:var(--lav);"></div>Прогноз погашения</div>
    <svg width="100%" viewBox="0 0 ${svgW} ${svgH}" style="overflow:visible;display:block;margin-bottom:6px;"><defs><linearGradient id="gl" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#6b9fff" stop-opacity=".18"/><stop offset="100%" stop-color="#6b9fff" stop-opacity="0"/></linearGradient></defs><polygon points="10,${svgH-10} ${pts} ${(fc.length>1?1:0)*(svgW-20)+10},${svgH-10}" fill="url(#gl)"/><polyline points="${pts}" fill="none" stroke="var(--blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);font-weight:600;"><span>${f(fc[0]||0)} ₽</span><span style="color:var(--sage);">0 ₽</span></div>
    <div style="text-align:center;margin-top:9px;background:var(--surface);border-radius:9px;padding:10px;"><div style="font-size:10px;color:var(--muted);font-weight:700;">Без кредитов через</div><div style="font-size:20px;font-weight:800;color:var(--blue);margin-top:2px;">${fcMo} мес.</div><div style="font-size:10px;color:var(--muted);">${Math.floor(fcMo/12)} лет ${fcMo%12} мес.</div></div>
  </div>
  <div class="card"><div class="stl"><div class="stl-dot" style="background:var(--amber);"></div>Ежемесячно банкам</div>
    ${cr.map((c,i)=>{const effR=c.graceRate||c.rate;const int=Math.round(c.balance*effR/100/12),bw=totInt>0?(int/totInt)*100:0;return`<div style="margin-bottom:11px;"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;"><span style="font-weight:700;">${c.name} <span style="color:var(--muted);font-weight:500;">${effR}%</span></span><span style="color:${int>0?'var(--red)':'var(--sage)'};font-weight:700;">${int>0?`−${f(int)}/мес`:'0 ₽'}</span></div><div style="background:var(--border);border-radius:3px;height:4px;overflow:hidden;"><div style="width:${bw}%;height:100%;background:${c.color||CC[i]};border-radius:3px;opacity:.8;"></div></div></div>`;}).join('')}
    <div style="background:var(--surface);border-radius:9px;padding:10px 13px;display:flex;justify-content:space-between;align-items:center;"><span style="font-size:11px;color:var(--muted);font-weight:600;">Итого %/мес</span><span style="font-size:16px;font-weight:800;color:var(--amber);">${f(totInt)} ₽</span></div>
  </div>`;
}

// ══════════════════════════════════════
// EXTRA (История + Заметки + PDF)
// ══════════════════════════════════════
function rExtra(){
  const s=STAB.extra;
  return`<div class="stabs">
    <button class="stab ${s==='history'?'on':''}" onclick="setST('extra','history')">История</button>
    <button class="stab ${s==='notes'?'on':''}"   onclick="setST('extra','notes')">Заметки</button>
    <button class="stab ${s==='pdf'?'on':''}"     onclick="setST('extra','pdf')">📤 Экспорт</button>
  </div>
  ${s==='history'?rHistory():''}${s==='notes'?rNotes():''}${s==='pdf'?rPDF():''}`;
}

function rHistory(){
  const hist=[...S.history].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const totPaid=hist.reduce((s,h)=>s+h.amt,0);
  return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;"><span style="font-size:11px;color:var(--muted);font-weight:700;">Всего внесено</span><span style="font-size:17px;font-weight:800;color:var(--blue);">${f(totPaid)} ₽</span></div>
  ${hist.length===0?`<div class="card"><div class="empty">История пуста</div></div>`:
  `<div class="card">${hist.map(h=>`<div class="titem"><div class="tdot" style="background:#0f1b2e;color:var(--blue);">◈</div><div class="tbody"><div style="font-size:12px;font-weight:700;">${h.cn}</div><div style="font-size:14px;font-weight:800;color:var(--blue);">−${f(h.amt)} ₽</div>${h.note?`<div style="font-size:10px;color:var(--muted);">${h.note}</div>`:''}<div style="font-size:10px;color:var(--muted);margin-top:2px;">${fd(h.date)}</div></div></div>`).join('')}</div>
  <button class="btn bdanger bsm" style="width:100%;margin-top:6px;" onclick="clrHist()">Очистить историю</button>`}`;
}

function rNotes(){
  const notes=[...S.notes].sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)||(new Date(b.date)-new Date(a.date)));
  return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
    <span style="font-size:11px;color:var(--muted);font-weight:700;">${notes.length} заметок</span>
    <button class="btn bprimary bsm" onclick="openAddNote()">+ Заметка</button>
  </div>
  ${notes.length===0?`<div class="card"><div class="empty">Заметок нет</div></div>`:''}
  ${notes.map(n=>`<div class="card" style="border-left:3px solid ${n.color||'var(--border2)'};cursor:pointer;" onclick="openNote(${n.id})">
    <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
      <div style="font-size:13px;font-weight:700;color:${n.color||'var(--text)'};">${n.pinned?'📌 ':''} ${n.title||'Без названия'}</div>
      <span style="font-size:10px;color:var(--muted);font-weight:600;flex-shrink:0;margin-left:8px;">${fds(n.date)}</span>
    </div>
    ${n.text?`<div style="font-size:11px;color:var(--text2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${n.text}</div>`:''}
    <div style="display:flex;gap:5px;margin-top:8px;" onclick="event.stopPropagation()">
      <button class="btn bghost bsm" onclick="togglePin(${n.id})">${n.pinned?'Открепить':'📌 Закрепить'}</button>
      <button class="btn bdanger bsm" onclick="delNote(${n.id})">Удалить</button>
    </div>
  </div>`).join('')}`;
}

function rPDF(){
  const T=totals();
  const totInt=S.credits.reduce((s,c)=>s+c.balance*(c.graceRate||c.rate)/100/12,0);
  return`<div class="card">
    <div class="stl"><div class="stl-dot" style="background:var(--lav);"></div>Финансовая сводка</div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:14px;">Нажми кнопку ниже — браузер предложит сохранить как PDF или распечатать</div>
    <div style="background:var(--surface);border-radius:10px;padding:13px;margin-bottom:12px;">
      <div style="font-size:14px;font-weight:800;margin-bottom:10px;text-align:center;">📊 Финансовый отчёт · ${new Date().toLocaleDateString('ru-RU')}</div>
      <div style="font-size:12px;margin-bottom:6px;"><b>Кредитный долг:</b> ${f(T.cd)} ₽</div>
      <div style="font-size:12px;margin-bottom:6px;"><b>Ежемесячно банкам:</b> ${f(totInt)} ₽</div>
      <div style="font-size:12px;margin-bottom:6px;"><b>Доход:</b> +${f(T.ic)} ₽/мес</div>
      <div style="font-size:12px;margin-bottom:10px;"><b>Остаток:</b> ${f(T.rem)} ₽/мес</div>
      ${S.credits.map(c=>`<div style="font-size:11px;padding:5px 0;border-top:1px solid var(--border);"><b>${c.name}:</b> ${f(c.balance)} ₽ · ${c.rate}% · ${f(c.payment)} ₽/мес</div>`).join('')}
    </div>
    <button class="btn bprimary" style="width:100%;" onclick="doPrint()">📤 Сохранить / Распечатать</button>
  </div>`;
}

  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Финансовый отчёт</title>
  <style>body{font-family:Arial,sans-serif;max-width:700px;margin:0 auto;padding:20px;color:#222;}
  h1{font-size:22px;margin-bottom:4px;}h2{font-size:16px;margin:20px 0 10px;border-bottom:2px solid #eee;padding-bottom:6px;}
  table{width:100%;border-collapse:collapse;margin-bottom:12px;}
  td,th{padding:8px 10px;border:1px solid #ddd;font-size:13px;text-align:left;}th{background:#f5f5f5;font-weight:700;}
  .red{color:#c00;}.green{color:#060;}.row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #eee;font-size:13px;}
  @media print{button{display:none;}}</style></head><body>
  <h1>📊 Финансовый отчёт</h1><p style="color:#666;font-size:12px;">Дата: ${new Date().toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'})}</p>
  <h2>Кредиты</h2>
  <table><tr><th>Кредит</th><th>Остаток</th><th>Ставка</th><th>Платёж/мес</th><th>% банку/мес</th></tr>
  ${S.credits.map(c=>{const eff=c.graceRate||c.rate;const int=Math.round(c.balance*eff/100/12);return`<tr><td>${c.name}</td><td class="red">${f(c.balance)} ₽</td><td>${c.rate}%</td><td>${f(c.payment)} ₽</td><td class="red">${f(int)} ₽</td></tr>`;}).join('')}
  <tr style="font-weight:700;"><td>ИТОГО</td><td class="red">${f(T.cd)} ₽</td><td>—</td><td>${f(T.py)} ₽</td><td class="red">${f(totInt)} ₽</td></tr></table>
  <h2>Долги без %</h2>
  <table><tr><th>Кому</th><th>Сумма</th><th>Срочность</th></tr>
  ${S.freeDebts.map(d=>`<tr><td>${d.name}</td><td>${f(d.amount)} ₽</td><td>${URG[d.urg].lbl}</td></tr>`).join('')}
  <tr style="font-weight:700;"><td>ИТОГО</td><td>${f(T.fd)} ₽</td><td>—</td></tr></table>
  <h2>Бюджет месяца</h2>
  <div class="row"><span>Доход</span><span class="green">+${f(T.ic)} ₽</span></div>
  <div class="row"><span>Расходы</span><span class="red">−${f(T.ex)} ₽</span></div>
  <div class="row"><span>Кредитные платежи</span><span class="red">−${f(T.py)} ₽</span></div>
  <div class="row" style="font-weight:700;border-top:2px solid #ccc;margin-top:4px;"><span>Остаток</span><span ${T.rem>=0?'class="green"':'class="red"'}>${T.rem>=0?'+':''}${f(T.rem)} ₽</span></div>
  <p style="margin-top:30px;font-size:10px;color:#999;">Сформировано автоматически · ${window.location.hostname}</p>
  <script>window.print();<\/script></body></html>`);
  w.document.close();
}

// ══════════════════════════════════════
// MODALS
// ══════════════════════════════════════
function modal(html){document.getElementById('mc').innerHTML=`<div class="overlay" onclick="if(event.target===this)cm()"><div class="modal">${html}</div></div>`;}
function cm(){document.getElementById('mc').innerHTML='';}

function openPay(id){
  const c=S.credits.find(x=>x.id==id);if(!c)return;
  const dl=c.graceEnd?daysLeft(c.graceEnd):null;
  modal(`<div class="mtitle">Платёж — ${c.name}</div>
  ${dl!==null&&dl>0?`<div class="alert agreen" style="margin-bottom:12px;">✓ БП активен ещё ${dl} дн. — закрой полностью → 0%</div>`:''}
  <div style="text-align:center;font-size:12px;color:var(--muted);margin-bottom:14px;">Остаток: <b style="color:var(--red);">${f(c.balance)} ₽</b></div>
  <div class="ig"><label class="ilbl">Сумма</label><input type="number" id="pAmt" value="${Math.min(Math.ceil(c.balance),c.balance<=c.payment?Math.ceil(c.balance):c.payment)}"></div>
  <div class="ig"><label class="ilbl">Дата</label><input type="date" id="pDate" value="${today()}"></div>
  <div class="ig"><label class="ilbl">Заметка</label><input type="text" id="pNote" placeholder="Необязательно..."></div>
  <div class="mbtns"><button class="btn bghost" style="flex:1;" onclick="cm()">Отмена</button><button class="btn bprimary" style="flex:1;" onclick="subPay(${id})">Записать</button></div>`);
}
function subPay(id){
  const amt=parseFloat(document.getElementById('pAmt').value)||0,dt=document.getElementById('pDate').value,note=document.getElementById('pNote').value;
  if(amt<=0){toast('Введи сумму');return;}
  const c=S.credits.find(x=>x.id==id);
  S.credits=S.credits.map(x=>x.id==id?{...x,balance:Math.max(0,x.balance-amt)}:x);
  S.history.push({id:uid(),date:dt,cid:id,cn:c.name,amt,note,type:'payment'});
  save();cm();toast(`Платёж ${f(amt)} ₽ записан`);render();
}

function openAddC(){
  modal(`<div class="mtitle">Новый кредит</div>
  <div class="ig"><label class="ilbl">Название</label><input type="text" id="cN" placeholder="Т-банк карта"></div>
  <div class="ig"><label class="ilbl">Остаток (₽)</label><input type="number" id="cB" placeholder="100000"></div>
  <div class="ig"><label class="ilbl">Ставка % (после БП)</label><input type="number" id="cR" placeholder="39.9"></div>
  <div class="ig"><label class="ilbl">Ежемесячный платёж (₽)</label><input type="number" id="cP" placeholder="5000"></div>
  <div class="ig"><label class="ilbl">День напоминания (1–31)</label><input type="number" id="cD" placeholder="15" min="1" max="31"></div>
  <div class="ig"><label class="ilbl">Конец льготного периода</label><input type="date" id="cG"></div>
  <div class="mbtns"><button class="btn bghost" style="flex:1;" onclick="cm()">Отмена</button><button class="btn bprimary" style="flex:1;" onclick="subAddC()">Добавить</button></div>`);
}
function subAddC(){
  const n=document.getElementById('cN').value.trim(),b=parseFloat(document.getElementById('cB').value)||0,r=parseFloat(document.getElementById('cR').value)||0,p=parseFloat(document.getElementById('cP').value)||0,d=parseInt(document.getElementById('cD').value)||0,g=document.getElementById('cG').value;
  if(!n||b<=0){toast('Заполни название и сумму');return;}
  S.credits.push({id:uid(),name:n,balance:b,rate:r,payment:p,rday:d,graceEnd:g,graceRate:g?0:r,color:CC[S.credits.length%CC.length],goal:''});
  save();cm();toast('Кредит добавлен');render();
}
function openEditC(id){
  const c=S.credits.find(x=>x.id==id);if(!c)return;
  modal(`<div class="mtitle">Изменить — ${c.name}</div>
  <div class="ig"><label class="ilbl">Название</label><input type="text" id="cN" value="${c.name}"></div>
  <div class="ig"><label class="ilbl">Остаток (₽)</label><input type="number" id="cB" value="${c.balance}"></div>
  <div class="ig"><label class="ilbl">Ставка % (после БП)</label><input type="number" id="cR" value="${c.rate}"></div>
  <div class="ig"><label class="ilbl">Ежемесячный платёж (₽)</label><input type="number" id="cP" value="${c.payment}"></div>
  <div class="ig"><label class="ilbl">День напоминания</label><input type="number" id="cD" value="${c.rday||''}" min="1" max="31"></div>
  <div class="ig"><label class="ilbl">Конец льготного периода</label><input type="date" id="cG" value="${c.graceEnd||''}"></div>
  <div class="mbtns"><button class="btn bdanger bsm" onclick="delC(${id})">Удалить</button><button class="btn bghost" style="flex:1;" onclick="cm()">Отмена</button><button class="btn bprimary" style="flex:1;" onclick="subEditC(${id})">Сохранить</button></div>`);
}
function subEditC(id){
  const n=document.getElementById('cN').value.trim(),b=parseFloat(document.getElementById('cB').value)||0,r=parseFloat(document.getElementById('cR').value)||0,p=parseFloat(document.getElementById('cP').value)||0,d=parseInt(document.getElementById('cD').value)||0,g=document.getElementById('cG').value;
  S.credits=S.credits.map(x=>x.id==id?{...x,name:n,balance:b,rate:r,payment:p,rday:d,graceEnd:g,graceRate:g?0:r}:x);
  save();cm();toast('Сохранено');render();
}
function delC(id){if(!confirm('Удалить кредит?'))return;S.credits=S.credits.filter(x=>x.id!=id);save();cm();render();}
function openAddFD(){
  modal(`<div class="mtitle">Долг без процентов</div>
  <div class="ig"><label class="ilbl">Кому должен</label><input type="text" id="dN" placeholder="Мама"></div>
  <div class="ig"><label class="ilbl">Сумма (₽)</label><input type="number" id="dA" placeholder="50000"></div>
  <div class="ig"><label class="ilbl">Срочность</label><select id="dU"><option value="high">Срочно</option><option value="medium" selected>Скоро</option><option value="low">Подождёт</option></select></div>
  <div class="mbtns"><button class="btn bghost" style="flex:1;" onclick="cm()">Отмена</button><button class="btn bprimary" style="flex:1;" onclick="subAddFD()">Добавить</button></div>`);
}
function subAddFD(){
  const n=document.getElementById('dN').value.trim(),a=parseFloat(document.getElementById('dA').value)||0;
  if(!n||a<=0){toast('Заполни поля');return;}
  S.freeDebts.push({id:uid(),name:n,amount:a,urg:document.getElementById('dU').value});
  save();cm();toast('Добавлено');render();
}
function openAddDt(){
  modal(`<div class="mtitle">Кто мне должен</div>
  <div class="ig"><label class="ilbl">Имя</label><input type="text" id="pN" placeholder="Имя"></div>
  <div class="ig"><label class="ilbl">Сумма (₽)</label><input type="number" id="pA" placeholder="10000"></div>
  <div class="ig"><label class="ilbl">Дата займа</label><input type="date" id="pDt" value="${today()}"></div>
  <div class="ig"><label class="ilbl">Заметка</label><input type="text" id="pNo" placeholder="За что"></div>
  <div class="mbtns"><button class="btn bghost" style="flex:1;" onclick="cm()">Отмена</button><button class="btn bprimary" style="flex:1;" onclick="subAddDt()">Добавить</button></div>`);
}
function subAddDt(){
  const n=document.getElementById('pN').value.trim(),a=parseFloat(document.getElementById('pA').value)||0;
  if(!n||a<=0){toast('Заполни имя и сумму');return;}
  S.debtors.push({id:uid(),name:n,amount:a,date:document.getElementById('pDt').value,note:document.getElementById('pNo').value,status:'pending',paid:0});
  save();cm();toast('Добавлено');render();
}
function dtPaid(id){S.debtors=S.debtors.map(d=>d.id==id?{...d,status:'paid',paid:d.amount}:d);save();toast('Отмечено');render();}
function openPartial(id){
  const d=S.debtors.find(x=>x.id==id),rem=d.amount-(d.paid||0);
  modal(`<div class="mtitle">Частичный возврат — ${d.name}</div>
  <div style="text-align:center;font-size:12px;color:var(--muted);margin-bottom:12px;">Ожидаем: <b style="color:var(--sage);">${f(rem)} ₽</b></div>
  <div class="ig"><label class="ilbl">Сколько вернул</label><input type="number" id="pa" placeholder="${rem}"></div>
  <div class="mbtns"><button class="btn bghost" style="flex:1;" onclick="cm()">Отмена</button><button class="btn bprimary" style="flex:1;" onclick="subPartial(${id})">Записать</button></div>`);
}
function subPartial(id){
  const a=parseFloat(document.getElementById('pa').value)||0;if(a<=0){toast('Введи сумму');return;}
  S.debtors=S.debtors.map(d=>{if(d.id!=id)return d;const np=(d.paid||0)+a;return{...d,paid:np,status:np>=d.amount?'paid':'partial'};});
  save();cm();toast(`Записано ${f(a)} ₽`);render();
}
function delDt(id){S.debtors=S.debtors.filter(d=>d.id!=id);save();render();}

// TRACKER MODALS
function openAddEntry(){
  modal(`<div class="mtitle">Новый расход</div>
  <div class="ig"><label class="ilbl">Сумма (₽)</label><input type="number" id="eA" placeholder="500"></div>
  <div class="ig"><label class="ilbl">Категория</label><select id="eC">${CATS.map(c=>`<option>${c}</option>`).join('')}</select></div>
  <div class="ig"><label class="ilbl">Дата</label><input type="date" id="eD" value="${today()}"></div>
  <div class="ig"><label class="ilbl">Заметка</label><input type="text" id="eN" placeholder="Необязательно"></div>
  <div class="mbtns"><button class="btn bghost" style="flex:1;" onclick="cm()">Отмена</button><button class="btn bprimary" style="flex:1;" onclick="subAddEntry()">Добавить</button></div>`);
}
function subAddEntry(){
  if(!S.tracker)S.tracker={entries:[],limits:{}};
  const a=parseFloat(document.getElementById('eA').value)||0;
  if(a<=0){toast('Введи сумму');return;}
  S.tracker.entries.push({id:uid(),amt:a,cat:document.getElementById('eC').value,date:document.getElementById('eD').value,note:document.getElementById('eN').value});
  save();cm();toast(`Расход ${f(a)} ₽ записан`);render();
}
function delEntry(id){if(!S.tracker)return;S.tracker.entries=S.tracker.entries.filter(e=>e.id!=id);save();render();}
function openLimits(){
  if(!S.tracker)S.tracker={entries:[],limits:{}};
  modal(`<div class="mtitle">Лимиты по категориям</div>
  ${CATS.map(c=>`<div class="ig"><label class="ilbl">${c}</label><input type="number" value="${S.tracker.limits[c]||''}" placeholder="0 — без лимита" onchange="S.tracker.limits['${c}']=parseFloat(this.value)||0;save();"></div>`).join('')}
  <div class="mbtns"><button class="btn bprimary" style="flex:1;" onclick="cm();render();">Сохранить</button></div>`);
}

// NOTES MODALS
function openAddNote(){
  modal(`<div class="mtitle">Новая заметка</div>
  <div class="ig"><label class="ilbl">Заголовок</label><input type="text" id="nT" placeholder="Заголовок..."></div>
  <div class="ig"><label class="ilbl">Текст</label><textarea id="nB" placeholder="Текст заметки..."></textarea></div>
  <div class="ig"><label class="ilbl">Цвет</label><div style="display:flex;gap:8px;flex-wrap:wrap;">${NOTE_COLORS.map((c,i)=>`<div class="nc-btn ${i===0?'sel':''}" style="background:${c};" onclick="document.querySelectorAll('.nc-btn').forEach(x=>x.classList.remove('sel'));this.classList.add('sel');this.dataset.col='${c}';"></div>`).join('')}</div></div>
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;"><input type="checkbox" id="nP" style="width:18px;height:18px;"><label for="nP" style="font-size:12px;color:var(--text2);font-weight:600;cursor:pointer;">Закрепить</label></div>
  <div class="mbtns"><button class="btn bghost" style="flex:1;" onclick="cm()">Отмена</button><button class="btn bprimary" style="flex:1;" onclick="subAddNote()">Сохранить</button></div>`);
}
function subAddNote(){
  const t=document.getElementById('nT').value.trim(),b=document.getElementById('nB').value.trim();
  const sel=document.querySelector('.nc-btn.sel');
  const color=sel?(sel.dataset.col||sel.style.backgroundColor):NOTE_COLORS[0];
  S.notes.push({id:uid(),title:t,text:b,date:today(),color,pinned:document.getElementById('nP').checked});
  save();cm();toast('Заметка сохранена');render();
}
function openNote(id){
  const n=S.notes.find(x=>x.id==id);if(!n)return;
  modal(`<div class="mtitle" style="color:${n.color||'var(--text)'};">${n.title||'Без названия'}</div>
  <div class="ig"><label class="ilbl">Заголовок</label><input type="text" id="enT" value="${n.title||''}"></div>
  <div class="ig"><label class="ilbl">Текст</label><textarea id="enB">${n.text||''}</textarea></div>
  <div class="mbtns"><button class="btn bdanger bsm" onclick="delNote(${id})">Удалить</button><button class="btn bghost" style="flex:1;" onclick="cm()">Закрыть</button><button class="btn bprimary" style="flex:1;" onclick="subEditNote(${id})">Сохранить</button></div>`);
}
function subEditNote(id){
  const t=document.getElementById('enT').value.trim(),b=document.getElementById('enB').value.trim();
  S.notes=S.notes.map(n=>n.id==id?{...n,title:t,text:b}:n);
  save();cm();toast('Сохранено');render();
}
function delNote(id){if(!confirm('Удалить?'))return;S.notes=S.notes.filter(n=>n.id!=id);save();cm();render();}
function togglePin(id){S.notes=S.notes.map(n=>n.id==id?{...n,pinned:!n.pinned}:n);save();render();}

// ─── HELPERS ─────────────────────────────────────────
function updFD(id,k,v){S.freeDebts=S.freeDebts.map(d=>d.id==id?{...d,[k]:v}:d);save();}
function delFD(id){S.freeDebts=S.freeDebts.filter(d=>d.id!=id);save();render();}
function updInc(k,v){S.income[k]=parseFloat(v)||0;save();}
function updEx(id,k,v){S.expenses=S.expenses.map(e=>e.id==id?{...e,[k]:k==='amt'?(parseFloat(v)||0):v}:e);save();}
function addEx(){S.expenses.push({id:uid(),name:'Статья',amt:0});save();render();}
function delEx(id){S.expenses=S.expenses.filter(e=>e.id!=id);save();render();}
function setST(p,t){STAB[p]=t;render();}
function clrHist(){if(confirm('Очистить историю?')){S.history=[];save();render();}}
function toast(msg){const el=document.createElement('div');el.className='toast';el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),2700);}

function checkNotif(){
  if(!('Notification' in window))return;
  const d=new Date().getDate(),due=S.credits.filter(c=>c.balance>0&&c.rday===d);
  if(!due.length)return;
  if(Notification.permission==='granted'){due.forEach(c=>new Notification('Платёж сегодня',{body:`${c.name} — ${f(c.payment)} ₽`,tag:`pay-${c.id}`}));}
  else if(Notification.permission!=='denied'){Notification.requestPermission().then(p=>{if(p==='granted')checkNotif();});}
}

if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}
render();
setTimeout(checkNotif,1200);
</script>
</body>
</html>
