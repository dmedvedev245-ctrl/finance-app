<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Финансы">
<title>Финансы</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0d1117;--surface:#13192a;--card:#17202f;--card2:#1c2538;--border:#242d40;--border2:#2e3a50;
  --blue:#6b9fff;--teal:#4db8c8;--amber:#e8a84a;--rose:#d4738a;--sage:#5cb88a;--lav:#8b8dce;
  --red:#c96060;--red-bg:#1e1418;--green-bg:#111c16;--yel:#c9a84a;--yel-bg:#1c1810;
  --text:#c8d4e8;--text2:#8a9ab8;--muted:#4a5a78;
  --nav:58px;--safe:env(safe-area-inset-bottom,0px);--r:13px;
}
body{font-family:'Manrope',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
.app{max-width:420px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

/* HEADER */
.hdr{padding:46px 16px 12px;border-bottom:1px solid var(--border);background:rgba(13,17,23,.96);backdrop-filter:blur(20px);position:sticky;top:0;z-index:50;}
.hdr-row{display:flex;justify-content:space-between;align-items:flex-end;}
.hdr-lbl{font-size:9px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:2px;font-weight:700;}
.hdr-title{font-size:19px;font-weight:800;color:var(--text);letter-spacing:-.02em;}
.hdr-val{font-size:16px;font-weight:700;color:var(--red);}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:12px 14px calc(var(--nav) + var(--safe) + 12px);}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;background:rgba(13,17,23,.97);backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe);z-index:100;}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;padding:6px 2px;background:none;border:none;cursor:pointer;color:var(--muted);font-size:8px;font-family:inherit;min-height:var(--nav);transition:color .2s;font-weight:700;letter-spacing:.03em;}
.nb.on{color:var(--blue);}
.nb .ic{font-size:18px;line-height:1;margin-bottom:1px;}

/* CARD */
.card{background:var(--card);border-radius:var(--r);padding:13px 14px;border:1px solid var(--border);margin-bottom:9px;}
.stl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:11px;display:flex;align-items:center;gap:5px;}
.stl-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}

/* STAT GRID */
.sgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:9px;}
.sbox{background:var(--surface);border-radius:9px;padding:9px 6px;border:1px solid var(--border);text-align:center;}
.sl{font-size:7px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;font-weight:700;}
.sv{font-size:10px;font-weight:700;line-height:1.2;}

/* BADGE */
.badge{display:inline-block;font-size:8px;font-weight:800;padding:2px 7px;border-radius:5px;letter-spacing:.05em;text-transform:uppercase;}

/* SUB TABS */
.stabs{display:flex;gap:3px;margin-bottom:11px;background:var(--surface);padding:3px;border-radius:9px;}
.stab{flex:1;padding:7px 3px;border-radius:7px;border:none;background:transparent;color:var(--muted);font-size:10px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit;}
.stab.on{background:var(--card2);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.4);}

/* LIST */
.li{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--border);}
.li:last-child{border-bottom:none;padding-bottom:0;}

/* INPUTS */
input,select,textarea{background:var(--surface);border:1px solid var(--border2);border-radius:9px;padding:10px 11px;color:var(--text);font-size:14px;outline:none;width:100%;font-family:inherit;-webkit-appearance:none;appearance:none;transition:border-color .2s;}
input:focus,select:focus,textarea:focus{border-color:var(--blue);}
textarea{resize:vertical;min-height:90px;}
.ig{margin-bottom:9px;}
.ilbl{font-size:10px;color:var(--muted);margin-bottom:4px;display:block;font-weight:700;letter-spacing:.03em;}

/* BUTTONS */
.btn{padding:11px 16px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s,transform .1s;}
.btn:active{opacity:.8;transform:scale(.98);}
.bprimary{background:var(--blue);color:#0d1117;}
.boutline{background:transparent;border:1px solid var(--border2);color:var(--text2);}
.bsm{padding:6px 12px;font-size:11px;border-radius:8px;}
.bdanger{background:var(--red-bg);color:var(--red);border:1px solid transparent;}
.bghost{background:var(--surface);color:var(--text2);border:1px solid var(--border);}
.bsage{background:var(--green-bg);color:var(--sage);border:1px solid transparent;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .15s;}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 16px calc(env(safe-area-inset-bottom,0px) + 20px);width:100%;max-width:420px;max-height:88vh;overflow-y:auto;animation:slideUp .2s;border-top:1px solid var(--border2);}
.mtitle{font-size:15px;font-weight:800;margin-bottom:16px;text-align:center;letter-spacing:-.01em;}
.mbtns{display:flex;gap:7px;margin-top:16px;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(28px);opacity:0}to{transform:translateY(0);opacity:1}}

/* PROGRESS */
.pbar{background:var(--border);border-radius:4px;height:4px;overflow:hidden;margin-top:5px;}
.pfill{height:100%;border-radius:4px;transition:width .5s;}

/* TOAST */
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--border2);border-radius:10px;padding:8px 16px;font-size:12px;font-weight:600;z-index:999;white-space:nowrap;pointer-events:none;animation:toastAnim 2.6s forwards;color:var(--text);box-shadow:0 8px 24px rgba(0,0,0,.4);}
@keyframes toastAnim{0%{opacity:0;transform:translateX(-50%) translateY(-6px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}75%{opacity:1}100%{opacity:0}}

/* ALERTS */
.alert{display:flex;align-items:center;gap:9px;padding:10px 11px;border-radius:10px;margin-bottom:6px;font-size:12px;font-weight:500;}
.ared{background:var(--red-bg);border:1px solid #c9606033;}
.ayellow{background:var(--yel-bg);border:1px solid #c9a84a33;}

/* TIMELINE */
.titem{display:flex;gap:11px;padding-bottom:14px;position:relative;}
.titem::before{content:'';position:absolute;left:13px;top:28px;bottom:0;width:1px;background:var(--border);}
.titem:last-child::before{display:none;}
.tdot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;z-index:1;}
.tbody{flex:1;padding-top:3px;}

.div{height:1px;background:var(--border);margin:9px 0;}
.row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;}
.rl{font-size:12px;color:var(--text2);}
.rv{font-size:13px;font-weight:700;}
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;}
.empty{text-align:center;color:var(--muted);font-size:13px;padding:24px;line-height:2.2;font-weight:500;}

/* COUNTDOWN */
.countdown{background:var(--red-bg);border:1px solid #c9606044;border-radius:var(--r);padding:13px 14px;margin-bottom:9px;}
.cd-days{font-size:36px;font-weight:800;color:var(--red);line-height:1;letter-spacing:-.03em;}
.cd-days.ok{color:var(--yel);}

/* NOTES */
.note-card{background:var(--card);border-radius:var(--r);padding:12px 13px;border:1px solid var(--border);margin-bottom:8px;cursor:pointer;transition:border-color .2s;}
.note-card:active{opacity:.85;}
.note-pin{display:inline-block;font-size:10px;margin-bottom:4px;}
.note-colors{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.nc{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .15s;}
.nc.sel{border-color:var(--text);}
</style>
</head>
<body>
<div class="app">
  <header class="hdr">
    <div class="hdr-row">
      <div><div class="hdr-lbl">Дашборд</div><div class="hdr-title" id="htitle">Обзор</div></div>
      <div style="text-align:right;"><div class="hdr-lbl">Кредитный долг</div><div class="hdr-val" id="hdebt">—</div></div>
    </div>
  </header>
  <main class="content" id="content"></main>
  <nav class="bnav">
    <button class="nb on" data-t="home"    onclick="go('home')">   <span class="ic">⊙</span>Главная</button>
    <button class="nb"    data-t="debts"   onclick="go('debts')">  <span class="ic">◈</span>Долги</button>
    <button class="nb"    data-t="people"  onclick="go('people')"> <span class="ic">◎</span>Люди</button>
    <button class="nb"    data-t="history" onclick="go('history')"><span class="ic">≡</span>История</button>
    <button class="nb"    data-t="charts"  onclick="go('charts')"> <span class="ic">◫</span>Графики</button>
    <button class="nb"    data-t="notes"   onclick="go('notes')">  <span class="ic">✎</span>Заметки</button>
  </nav>
</div>
<div id="mc"></div>
<script>
const CC=['#6b9fff','#e8a84a','#4db8c8','#5cb88a','#d4738a','#8b8dce'];

// ─── DEFAULT STATE ────────────────────────────────────
const DEF={
  credits:[
    {id:1,name:'Т-банк карта',  balance:127913.80,rate:39.9, payment:10233,rday:8,  graceEnd:'2026-07-02',graceRate:0,  color:'#6b9fff',goal:''},
    {id:2,name:'Альфа карта',   balance:56858,    rate:58.49,payment:4549, rday:7,  graceEnd:'2026-07-07',graceRate:0,  color:'#e8a84a',goal:''},
    {id:3,name:'Сбер карта',    balance:60924.49, rate:25.4, payment:1828, rday:0,  graceEnd:'',          graceRate:25.4,color:'#4db8c8',goal:''},
    {id:4,name:'Яндекс Сплит',  balance:31178.09, rate:0,    payment:2179, rday:6,  graceEnd:'2028-03-06',graceRate:0,  color:'#5cb88a',goal:'2028-03-06'},
  ],
  freeDebts:[
    {id:1,name:'Мама',   amount:1700000,urg:'low'},
    {id:2,name:'Общий',  amount:70000,  urg:'medium'},
  ],
  income:{salary:95000,card:0,cash:0,incoming:0},
  expenses:[
    {id:1,name:'Продукты',amt:0},
    {id:2,name:'Аренда',  amt:0},
    {id:3,name:'Транспорт',amt:0},
  ],
  history:[],
  debtors:[],
  notes:[],
};

let S=loadState(), TAB='home', STAB={debts:'credits'};
function loadState(){try{const s=localStorage.getItem('fin_v5');if(s)return JSON.parse(s);}catch(e){}return JSON.parse(JSON.stringify(DEF));}
function save(){localStorage.setItem('fin_v5',JSON.stringify(S));}

// ─── UTILS ────────────────────────────────────────────
const f=n=>new Intl.NumberFormat('ru-RU').format(Math.round(n));
const fd=d=>d?new Date(d+'T12:00').toLocaleDateString('ru-RU',{day:'numeric',month:'short',year:'numeric'}):'';
const today=()=>new Date().toISOString().slice(0,10);
const uid=()=>Date.now()+Math.random();
const daysLeft=d=>{if(!d)return null;return Math.ceil((new Date(d+'T12:00')-new Date())/86400000);};

function months(bal,rate,pay){
  const r=rate/100/12;
  if(bal<=0)return 0;
  if(r===0)return pay>0?Math.ceil(bal/pay):Infinity;
  if(pay<=bal*r)return Infinity;
  return Math.ceil(-Math.log(1-(bal*r)/pay)/Math.log(1+r));
}
function prio(rate){
  if(rate>=40)return{lbl:'Срочно',  c:'#c96060',bg:'var(--red-bg)'};
  if(rate>=20)return{lbl:'Скоро',   c:'#c9a84a',bg:'var(--yel-bg)'};
  if(rate>0)  return{lbl:'Умеренно',c:'#6b9fff',bg:'#0f1b2e'};
  return             {lbl:'Рассрочка',c:'#5cb88a',bg:'var(--green-bg)'};
}
const URG={
  high:  {lbl:'Срочно',  c:'#c96060',bg:'var(--red-bg)'},
  medium:{lbl:'Скоро',   c:'#c9a84a',bg:'var(--yel-bg)'},
  low:   {lbl:'Подождёт',c:'#5cb88a',bg:'var(--green-bg)'},
};
const NOTE_COLORS=['#6b9fff','#5cb88a','#e8a84a','#c96060','#d4738a','#8b8dce','#4db8c8'];

function totals(){
  const cd=S.credits.reduce((s,c)=>s+c.balance,0);
  const fd=S.freeDebts.reduce((s,d)=>s+d.amount,0);
  const py=S.credits.reduce((s,c)=>s+c.payment,0);
  const ic=Object.values(S.income).reduce((s,v)=>s+v,0);
  const ex=S.expenses.reduce((s,e)=>s+e.amt,0);
  const dt=S.debtors.reduce((s,d)=>s+(d.amount-(d.paid||0)),0);
  return{cd,fd,tot:cd+fd,py,ic,ex,dt,rem:ic-ex-py};
}

const TITLES={home:'Обзор',debts:'Мои долги',people:'Люди',history:'История',charts:'Графики',notes:'Заметки'};
function go(t){TAB=t;document.querySelectorAll('.nb').forEach(b=>b.classList.toggle('on',b.dataset.t===t));document.getElementById('htitle').textContent=TITLES[t]||t;render();}

function render(){
  const T=totals();
  document.getElementById('hdebt').textContent=`−${f(T.cd)} ₽`;
  const c=document.getElementById('content');
  if(TAB==='home')   c.innerHTML=rHome(T);
  if(TAB==='debts')  c.innerHTML=rDebts(T);
  if(TAB==='people') c.innerHTML=rPeople(T);
  if(TAB==='history')c.innerHTML=rHistory();
  if(TAB==='charts') c.innerHTML=rCharts(T);
  if(TAB==='notes')  c.innerHTML=rNotes();
}

// ════════════════════════════════════════
// HOME
// ════════════════════════════════════════
function rHome(T){
  const now=new Date(), dd=now.getDate();

  // Grace period countdowns
  const graceCards=S.credits.filter(c=>c.balance>0&&c.graceEnd&&c.graceRate===0&&c.rate>0).map(c=>{
    const dl=daysLeft(c.graceEnd);
    const urgent=dl!==null&&dl<=10;
    const gone=dl!==null&&dl<0;
    return`<div class="${urgent&&!gone?'countdown':'card'}" style="${!urgent||gone?`border-color:${c.color}33;`:''}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
        <div>
          <div style="font-size:9px;color:${urgent?'var(--red)':'var(--muted)'};font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px;">БП · ${c.name}</div>
          <div style="font-size:12px;color:var(--text2);">Закрыть: <b style="color:var(--text);">${f(c.balance)} ₽</b> до ${fd(c.graceEnd)}</div>
        </div>
        <div style="text-align:right;">
          <div class="cd-days ${!urgent?'ok':''}">${gone?'⛔':dl}</div>
          <div style="font-size:9px;color:var(--muted);font-weight:600;">${gone?'ПРОСРОЧЕН':'дн. осталось'}</div>
        </div>
      </div>
      <div style="display:flex;gap:7px;">
        <button class="btn bprimary bsm" style="flex:1;" onclick="openPay(${c.id})">Внести платёж</button>
        ${urgent&&!gone?`<div style="font-size:10px;color:var(--red);font-weight:600;display:flex;align-items:center;">После: ${c.rate}%</div>`:''}
      </div>
    </div>`;
  }).join('');

  // Payment reminders
  const alerts=S.credits.filter(c=>c.balance>0&&c.rday).flatMap(c=>{
    const diff=c.rday-dd;
    if(diff===0)       return[{cls:'ared',  ico:'●',msg:`Сегодня платёж — ${c.name}: ${f(c.payment)} ₽`,id:c.id}];
    if(diff>0&&diff<=3)return[{cls:'ayellow',ico:'○',msg:`Через ${diff} дн. — ${c.name}: ${f(c.payment)} ₽`,id:c.id}];
    if(diff<0&&diff>=-2)return[{cls:'ared', ico:'▲',msg:`Просрочен платёж — ${c.name}`,id:c.id}];
    return[];
  });

  const pinned=S.notes.filter(n=>n.pinned).slice(0,2);
  const totInt=S.credits.reduce((s,c)=>s+c.balance*(c.graceRate||c.rate)/100/12,0);

  return`${graceCards}
  ${alerts.length?`<div class="card" style="border-color:#c9606033;"><div class="stl"><div class="stl-dot" style="background:var(--red);"></div>Платежи</div>${alerts.map(a=>`<div class="alert ${a.cls}"><span style="font-size:10px;color:${a.cls==='ared'?'var(--red)':'var(--yel)'};">${a.ico}</span><span style="flex:1;color:var(--text2);">${a.msg}</span><button class="btn bprimary bsm" onclick="openPay(${a.id})">Платёж</button></div>`).join('')}</div>`:''}

  <div class="sgrid">
    <div class="sbox"><div class="sl">Кредиты</div><div class="sv" style="color:var(--red);">−${f(T.cd)} ₽</div></div>
    <div class="sbox"><div class="sl">Долги б/п</div><div class="sv" style="color:var(--amber);">−${f(T.fd)} ₽</div></div>
    <div class="sbox"><div class="sl">Мне должны</div><div class="sv" style="color:var(--sage);">+${f(T.dt)} ₽</div></div>
    <div class="sbox"><div class="sl">Доход/мес</div><div class="sv" style="color:var(--teal);">+${f(T.ic)} ₽</div></div>
    <div class="sbox"><div class="sl">Платежи</div><div class="sv" style="color:var(--rose);">−${f(T.py)} ₽</div></div>
    <div class="sbox"><div class="sl">Остаток</div><div class="sv" style="color:${T.rem>=0?'var(--sage)':'var(--red)'};">${T.rem>=0?'+':''}${f(T.rem)} ₽</div></div>
  </div>

  <div class="card" style="background:var(--surface);">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <div><div style="font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.08em;text-transform:uppercase;">Ежемесячно банкам</div><div style="font-size:22px;font-weight:800;color:var(--red);letter-spacing:-.03em;margin-top:3px;">${f(totInt)} ₽</div></div>
      <div style="text-align:right;"><div style="font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.08em;text-transform:uppercase;">В год</div><div style="font-size:16px;font-weight:700;color:var(--amber);margin-top:3px;">${f(totInt*12)} ₽</div></div>
    </div>
  </div>

  <div class="card">
    <div class="stl"><div class="stl-dot" style="background:var(--amber);"></div>Приоритет закрытия</div>
    <div style="font-size:10px;color:var(--muted);margin-bottom:10px;font-weight:500;">Метод лавины — сначала высокий %</div>
    ${[...S.credits].sort((a,b)=>(b.graceRate||b.rate)-(a.graceRate||a.rate)).map((c,i)=>{
      const eff=c.graceEnd&&daysLeft(c.graceEnd)>0?0:(c.graceRate||c.rate);
      const p=prio(eff), mo=months(c.balance,eff,c.payment);
      const int=Math.round(c.balance*eff/100/12);
      const dl=c.graceEnd?daysLeft(c.graceEnd):null;
      return`<div class="li">
        <div style="width:24px;height:24px;border-radius:7px;background:${p.bg};color:${p.c};font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${i+1}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:13px;font-weight:700;">${c.name}</div>
          <div style="font-size:10px;color:var(--muted);">${eff===0?'0% рассрочка':eff+'%'} · ${f(c.balance)} ₽ · ${isFinite(mo)?mo+' мес':'∞'}${dl!==null&&dl>0?' · БП '+dl+' дн.':''}</div>
        </div>
        <div style="text-align:right;flex-shrink:0;">
          ${int>0?`<div style="font-size:10px;color:var(--red);font-weight:600;">−${f(int)}/мес</div>`:`<div style="font-size:10px;color:var(--sage);font-weight:600;">0%</div>`}
          <span class="badge" style="background:${p.bg};color:${p.c};margin-top:2px;">${p.lbl}</span>
        </div>
      </div>`;
    }).join('')}
  </div>

function rCredits(){
  return S.credits.map(c=>{
    const dl=c.graceEnd?daysLeft(c.graceEnd):null;

    const p=prio(effRate);
    const int=c.balance*effRate/100/12;
    const prin=Math.max(0,c.payment-int);
    const mo=months(c.balance,effRate,c.payment);
    const ov=isFinite(mo)&&effRate>0?c.payment*mo-c.balance:null;
    const paid=S.history.filter(h=>h.cid===c.id).reduce((s,h)=>s+h.amt,0);
    const orig=c.balance+paid, pct=orig>0?Math.round(paid/orig*100):0;
    return`<div class="card" style="border-left:3px solid ${c.color||'var(--blue)'};">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <div>
          <div style="font-size:14px;font-weight:800;">${c.name}</div>
          <div style="display:flex;gap:5px;align-items:center;margin-top:4px;">
            <span class="badge" style="background:${p.bg};color:${p.c};">${p.lbl}</span>
            ${inGrace?`<span class="badge" style="background:var(--green-bg);color:var(--sage);">БП · ${dl} дн.</span>`:''}
          </div>
        </div>
        <button onclick="openEditC(${c.id})" style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 11px;color:var(--text2);cursor:pointer;font-size:11px;font-family:inherit;font-weight:700;">Изменить</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:9px;">
        <div class="sbox"><div class="sl">Остаток</div><div class="sv" style="color:var(--red);">${f(c.balance)} ₽</div></div>
        <div class="sbox"><div class="sl">Ставка</div><div class="sv" style="color:${effRate===0?'var(--sage)':'var(--amber)'};">${effRate===0?`0% (${c.rate}% после)`:effRate+'%'}</div></div>
        <div class="sbox"><div class="sl">Платёж</div><div class="sv">${f(c.payment)} ₽</div></div>
        <div class="sbox"><div class="sl">Ост. мес.</div><div class="sv" style="color:var(--blue);">${isFinite(mo)?mo:'∞'}</div></div>
      </div>
      ${effRate>0?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:9px;">
        <div style="background:var(--red-bg);border:1px solid #c9606022;border-radius:9px;padding:9px;text-align:center;"><div style="font-size:7px;color:var(--red);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px;">Банку %</div><div style="font-size:12px;font-weight:700;color:var(--red);">${f(int)} ₽</div></div>
        <div style="background:#0e1c1a;border:1px solid #4db8c822;border-radius:9px;padding:9px;text-align:center;"><div style="font-size:7px;color:var(--teal);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px;">Гасится</div><div style="font-size:12px;font-weight:700;color:var(--teal);">${f(prin)} ₽</div></div>
      </div>`:''}
      ${ov!==null?`<div style="background:var(--surface);border-radius:8px;padding:8px 11px;margin-bottom:9px;display:flex;justify-content:space-between;align-items:center;"><span style="font-size:10px;color:var(--muted);font-weight:600;">Переплата банку</span><span style="font-size:12px;font-weight:700;color:var(--amber);">${f(ov)} ₽</span></div>`:''}
      ${inGrace?`<div style="background:var(--green-bg);border-radius:8px;padding:8px 10px;margin-bottom:9px;font-size:11px;font-weight:600;color:var(--sage);border:1px solid #5cb88a33;">✓ В льготном периоде — закрой до ${fd(c.graceEnd)} → 0%</div>`:''}
      ${pct>0?`<div style="margin-bottom:9px;"><div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:4px;"><span style="color:var(--muted);">Прогресс погашения</span><span style="color:var(--blue);">${pct}%</span></div><div class="pbar"><div class="pfill" style="width:${pct}%;background:${c.color||'var(--blue)'};"></div></div></div>`:''}
      ${c.payment<=int&&effRate>0?`<div style="background:var(--red-bg);border-radius:8px;padding:8px 10px;margin-bottom:9px;color:var(--red);font-size:11px;font-weight:600;border:1px solid #c9606033;">▲ Платёж меньше процентов — долг растёт!</div>`:''}
      <button class="btn bprimary" style="width:100%;" onclick="openPay(${c.id})">Внести платёж</button>
    </div>`;
  }).join('')+`<button class="btn boutline" style="width:100%;margin-top:2px;" onclick="openAddC()">+ Добавить кредит</button>`;
}

  <button class="btn boutline" style="width:100%;margin-top:2px;" onclick="openAddFD()">+ Добавить долг</button>`;
}

      <input type="text" value="${e.name}" onchange="updEx(${e.id},'name',this.value)" style="flex:1;">

function rPeople(T){

  return`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><div class="stl" style="margin-bottom:0;"><div class="stl-dot" style="background:var(--sage);"></div>Мне должны</div><button class="btn bprimary bsm" onclick="openAddDt()">+ Добавить</button></div>

          ${d.status!=='paid'?`<button class="btn bghost bsm" onclick="openPartial(${d.id})">Частично</button>`:''}

}

// CHARTS
// ════════════════════════════════════════
function rCharts(T){
  const cr=S.credits.filter(c=>c.balance>0);
  const tot=cr.reduce((s,c)=>s+c.balance,0);
  let cumP=0,parts='';
  cr.forEach((c,i)=>{const p=(c.balance/tot)*100;parts+=`${c.color||CC[i]} ${cumP}% ${cumP+p}%,`;cumP+=p;});
  if(parts)parts=parts.slice(0,-1);
  let rem=cr.map(c=>({...c}));const fc=[];
  for(let m=0;m<=72;m++){const t=rem.reduce((s,c)=>s+Math.max(0,c.balance),0);fc.push(t);if(t<=0)break;rem=rem.map(c=>{if(c.balance<=0)return c;const effR=c.graceRate||c.rate;const i=c.balance*effR/100/12;return{...c,balance:Math.max(0,c.balance-Math.max(0,c.payment-i))};});}
  const fcMo=fc.length-1,svgW=340,svgH=95,mxF=Math.max(...fc,1);
  const pts=fc.map((v,i)=>{const x=(i/Math.max(fc.length-1,1))*(svgW-20)+10,y=svgH-10-((v/mxF)*(svgH-20));return`${x},${y}`;}).join(' ');
  const totInt=cr.reduce((s,c)=>s+c.balance*(c.graceRate||c.rate)/100/12,0);
  const maxP=Math.max(...cr.map(c=>c.payment),1);
  return`
  <div class="card"><div class="stl"><div class="stl-dot" style="background:var(--blue);"></div>Структура долга</div>
    <div style="display:flex;align-items:center;gap:14px;">
      <div style="width:95px;height:95px;border-radius:50%;background:conic-gradient(${parts||'var(--border) 0% 100%'});flex-shrink:0;position:relative;"><div style="position:absolute;inset:14px;border-radius:50%;background:var(--card);"></div></div>
      <div style="flex:1;display:flex;flex-direction:column;gap:7px;">${cr.map((c,i)=>{const p=tot>0?Math.round(c.balance/tot*100):0;return`<div style="display:flex;align-items:center;justify-content:space-between;"><div style="display:flex;align-items:center;gap:6px;font-size:11px;"><div style="width:7px;height:7px;border-radius:2px;background:${c.color||CC[i]};flex-shrink:0;"></div><span style="color:var(--text2);font-weight:600;">${c.name}</span></div><span style="font-size:11px;font-weight:700;">${p}%</span></div>`;}).join('')}</div>
    </div>
    <div style="margin-top:10px;font-size:11px;color:var(--muted);font-weight:600;text-align:center;">Итого: ${f(T.cd)} ₽</div>
  </div>
  <div class="card"><div class="stl"><div class="stl-dot" style="background:var(--lav);"></div>Прогноз погашения</div>
    <svg width="100%" viewBox="0 0 ${svgW} ${svgH}" style="overflow:visible;display:block;margin-bottom:7px;"><defs><linearGradient id="gl" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#6b9fff" stop-opacity=".18"/><stop offset="100%" stop-color="#6b9fff" stop-opacity="0"/></linearGradient></defs><polygon points="10,${svgH-10} ${pts} ${(fc.length>1?1:0)*(svgW-20)+10},${svgH-10}" fill="url(#gl)"/><polyline points="${pts}" fill="none" stroke="var(--blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);font-weight:600;"><span>${f(fc[0]||0)} ₽</span><span style="color:var(--sage);">0 ₽</span></div>
    <div style="text-align:center;margin-top:9px;background:var(--surface);border-radius:9px;padding:11px;"><div style="font-size:10px;color:var(--muted);font-weight:700;">Без кредитов через</div><div style="font-size:20px;font-weight:800;color:var(--blue);letter-spacing:-.02em;margin-top:2px;">${fcMo} мес.</div><div style="font-size:10px;color:var(--muted);margin-top:1px;">${Math.floor(fcMo/12)} лет ${fcMo%12} мес.</div></div>
  </div>
  <div class="card"><div class="stl"><div class="stl-dot" style="background:var(--red);"></div>Состав платежа</div>
    <div style="display:flex;align-items:flex-end;gap:9px;height:105px;margin-bottom:7px;">${cr.map((c,i)=>{const effR=c.graceRate||c.rate;const int=c.balance*effR/100/12,pr=Math.max(0,c.payment-int),th=(c.payment/maxP)*100,ih=c.payment>0?(int/c.payment)*100:0;return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%;justify-content:flex-end;"><div style="width:100%;border-radius:5px 5px 0 0;display:flex;flex-direction:column-reverse;overflow:hidden;height:${th}%;min-height:4px;"><div style="height:${100-ih}%;background:${c.color||CC[i]};opacity:.65;"></div><div style="height:${ih}%;background:var(--red);opacity:.55;"></div></div><div style="font-size:8px;color:var(--muted);text-align:center;font-weight:700;line-height:1.3;">${c.name.split(' ')[0]}</div></div>`;}).join('')}</div>
    <div style="display:flex;gap:12px;"><div style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted);font-weight:600;"><div style="width:7px;height:7px;background:var(--red);opacity:.55;border-radius:2px;"></div>Банку</div><div style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted);font-weight:600;"><div style="width:7px;height:7px;background:var(--blue);opacity:.65;border-radius:2px;"></div>Гашение</div></div>
  </div>
  <div class="card"><div class="stl"><div class="stl-dot" style="background:var(--amber);"></div>Ежемесячно банкам</div>
    ${cr.map((c,i)=>{const effR=c.graceRate||c.rate;const int=Math.round(c.balance*effR/100/12),bw=totInt>0?(int/totInt)*100:0;return`<div style="margin-bottom:11px;"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;"><span style="font-weight:700;">${c.name} <span style="color:var(--muted);font-weight:500;">${effR}%</span></span><span style="color:${int>0?'var(--red)':'var(--sage)'};font-weight:700;">${int>0?`−${f(int)}/мес`:'0 ₽'}</span></div><div style="background:var(--border);border-radius:3px;height:4px;overflow:hidden;"><div style="width:${bw}%;height:100%;background:${c.color||CC[i]};border-radius:3px;opacity:.75;"></div></div></div>`;}).join('')}
    <div style="background:var(--surface);border-radius:9px;padding:11px 13px;display:flex;justify-content:space-between;align-items:center;"><span style="font-size:11px;color:var(--muted);font-weight:600;">Итого процентов/мес</span><span style="font-size:16px;font-weight:800;color:var(--amber);">${f(totInt)} ₽</span></div>
  </div>`;
}

function rNotes(){
  const notes=[...S.notes].sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)||(new Date(b.date)-new Date(a.date)));
  return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:11px;padding:0 2px;">

    <button class="btn bprimary bsm" onclick="openAddNote()">+ Новая заметка</button>
  </div>
  ${notes.length===0?`<div class="card"><div class="empty">Заметок пока нет<br><span style="font-size:11px;">Нажми «+ Новая заметка»</span></div></div>`:''}
  ${notes.map(n=>`<div class="note-card" onclick="openNote(${n.id})" style="border-left:3px solid ${n.color||'var(--border2)'};">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px;">
      <div style="flex:1;min-width:0;">
        ${n.pinned?`<span class="note-pin">📌</span>`:''}
        <div style="font-size:13px;font-weight:700;color:${n.color||'var(--text)'};">${n.title||'Без названия'}</div>
      </div>
      <span style="font-size:10px;color:var(--muted);font-weight:600;flex-shrink:0;margin-left:8px;">${fd(n.date)}</span>
    </div>
    ${n.text?`<div style="font-size:11px;color:var(--text2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;">${n.text}</div>`:''}
    <div style="display:flex;gap:5px;margin-top:8px;">
      <button class="btn bghost bsm" onclick="event.stopPropagation();togglePin(${n.id})">${n.pinned?'Открепить':'📌 Закрепить'}</button>
      <button class="btn bdanger bsm" onclick="event.stopPropagation();delNote(${n.id})">Удалить</button>
    </div>
  </div>`).join('')}`;
}

// ════════════════════════════════════════
// MODALS
// ════════════════════════════════════════
function modal(html){document.getElementById('mc').innerHTML=`<div class="overlay" onclick="if(event.target===this)cm()"><div class="modal">${html}</div></div>`;}
function cm(){document.getElementById('mc').innerHTML='';}

function openPay(id){
  const c=S.credits.find(x=>x.id==id);if(!c)return;
  const dl=c.graceEnd?daysLeft(c.graceEnd):null;
  modal(`<div class="mtitle">Платёж — ${c.name}</div>
  ${dl!==null&&dl>0?`<div style="background:var(--green-bg);border-radius:9px;padding:9px 12px;margin-bottom:14px;color:var(--sage);font-size:11px;font-weight:600;text-align:center;">✓ БП активен ещё ${dl} дн. — закрой полностью → 0%</div>`:''}
  <div style="text-align:center;font-size:12px;color:var(--muted);margin-bottom:16px;font-weight:500;">Остаток: <b style="color:var(--red);">${f(c.balance)} ₽</b></div>
  <div class="ig"><label class="ilbl">Сумма платежа</label><input type="number" id="pAmt" value="${c.balance<=c.payment?Math.ceil(c.balance):c.payment}"></div>
  <div class="ig"><label class="ilbl">Дата</label><input type="date" id="pDate" value="${today()}"></div>
  <div class="ig"><label class="ilbl">Заметка</label><input type="text" id="pNote" placeholder="Необязательно..."></div>
  <div class="mbtns">
    <button class="btn bghost" style="flex:1;" onclick="cm()">Отмена</button>
    <button class="btn bprimary" style="flex:1;" onclick="subPay(${id})">Записать</button>
  </div>`);
}
function subPay(id){
  const amt=parseFloat(document.getElementById('pAmt').value)||0,dt=document.getElementById('pDate').value,note=document.getElementById('pNote').value;
  if(amt<=0){toast('Введи сумму');return;}
  const c=S.credits.find(x=>x.id==id);
  S.credits=S.credits.map(x=>x.id==id?{...x,balance:Math.max(0,x.balance-amt)}:x);
  S.history.push({id:uid(),date:dt,cid:id,cn:c.name,amt,note,type:'payment'});
  save();cm();toast(`Платёж ${f(amt)} ₽ записан`);render();
}

function openAddC(){
  modal(`<div class="mtitle">Новый кредит</div>
  <div class="ig"><label class="ilbl">Название</label><input type="text" id="cN" placeholder="Т-банк карта"></div>
  <div class="ig"><label class="ilbl">Остаток (₽)</label><input type="number" id="cB" placeholder="100000"></div>
  <div class="ig"><label class="ilbl">Ставка % (после льготного периода)</label><input type="number" id="cR" placeholder="39.9"></div>
  <div class="ig"><label class="ilbl">Ежемесячный платёж (₽)</label><input type="number" id="cP" placeholder="5000"></div>
  <div class="ig"><label class="ilbl">День месяца для напоминания</label><input type="number" id="cD" placeholder="15" min="1" max="31"></div>
  <div class="ig"><label class="ilbl">Конец льготного периода (если есть)</label><input type="date" id="cG"></div>
  <div class="mbtns">
    <button class="btn bghost" style="flex:1;" onclick="cm()">Отмена</button>
    <button class="btn bprimary" style="flex:1;" onclick="subAddC()">Добавить</button>
  </div>`);
}
function subAddC(){
  const n=document.getElementById('cN').value.trim(),b=parseFloat(document.getElementById('cB').value)||0,r=parseFloat(document.getElementById('cR').value)||0,p=parseFloat(document.getElementById('cP').value)||0,d=parseInt(document.getElementById('cD').value)||0,g=document.getElementById('cG').value;
  if(!n||b<=0){toast('Заполни название и сумму');return;}
  S.credits.push({id:uid(),name:n,balance:b,rate:r,payment:p,rday:d,graceEnd:g,graceRate:g?0:r,color:CC[S.credits.length%CC.length],goal:''});
  save();cm();toast('Кредит добавлен');render();
}

function openEditC(id){
  const c=S.credits.find(x=>x.id==id);if(!c)return;
  modal(`<div class="mtitle">Изменить — ${c.name}</div>
  <div class="ig"><label class="ilbl">Название</label><input type="text" id="cN" value="${c.name}"></div>
  <div class="ig"><label class="ilbl">Остаток (₽)</label><input type="number" id="cB" value="${c.balance}"></div>
  <div class="ig"><label class="ilbl">Ставка % (после льготного периода)</label><input type="number" id="cR" value="${c.rate}"></div>
  <div class="ig"><label class="ilbl">Ежемесячный платёж (₽)</label><input type="number" id="cP" value="${c.payment}"></div>
  <div class="ig"><label class="ilbl">День напоминания</label><input type="number" id="cD" value="${c.rday||''}" min="1" max="31"></div>
  <div class="ig"><label class="ilbl">Конец льготного периода</label><input type="date" id="cG" value="${c.graceEnd||''}"></div>
  <div class="mbtns">
    <button class="btn bdanger bsm" onclick="delC(${id})">Удалить</button>
    <button class="btn bghost" style="flex:1;" onclick="cm()">Отмена</button>
    <button class="btn bprimary" style="flex:1;" onclick="subEditC(${id})">Сохранить</button>
  </div>`);
}
function subEditC(id){
  const n=document.getElementById('cN').value.trim(),b=parseFloat(document.getElementById('cB').value)||0,r=parseFloat(document.getElementById('cR').value)||0,p=parseFloat(document.getElementById('cP').value)||0,d=parseInt(document.getElementById('cD').value)||0,g=document.getElementById('cG').value;
  S.credits=S.credits.map(x=>x.id==id?{...x,name:n,balance:b,rate:r,payment:p,rday:d,graceEnd:g,graceRate:g?0:r}:x);
  save();cm();toast('Сохранено');render();
}
function delC(id){if(!confirm('Удалить кредит?'))return;S.credits=S.credits.filter(x=>x.id!=id);save();cm();render();}

function openAddFD(){
  modal(`<div class="mtitle">Долг без процентов</div>
  <div class="ig"><label class="ilbl">Кому должен</label><input type="text" id="dN" placeholder="Мама"></div>
  <div class="ig"><label class="ilbl">Сумма (₽)</label><input type="number" id="dA" placeholder="50000"></div>
  <div class="ig"><label class="ilbl">Срочность</label><select id="dU"><option value="high">Срочно</option><option value="medium" selected>Скоро</option><option value="low">Подождёт</option></select></div>
  <div class="mbtns">
    <button class="btn bghost" style="flex:1;" onclick="cm()">Отмена</button>
    <button class="btn bprimary" style="flex:1;" onclick="subAddFD()">Добавить</button>
  </div>`);
}
function subAddFD(){
  const n=document.getElementById('dN').value.trim(),a=parseFloat(document.getElementById('dA').value)||0;
  if(!n||a<=0){toast('Заполни поля');return;}
  S.freeDebts.push({id:uid(),name:n,amount:a,urg:document.getElementById('dU').value});
  save();cm();toast('Добавлено');render();
}

function openAddDt(){
  modal(`<div class="mtitle">Кто мне должен</div>
  <div class="ig"><label class="ilbl">Имя</label><input type="text" id="pN" placeholder="Имя"></div>
  <div class="ig"><label class="ilbl">Сумма (₽)</label><input type="number" id="pA" placeholder="10000"></div>
  <div class="ig"><label class="ilbl">Дата займа</label><input type="date" id="pDt" value="${today()}"></div>
  <div class="ig"><label class="ilbl">Заметка</label><input type="text" id="pNo" placeholder="За что"></div>
  <div class="mbtns">
    <button class="btn bghost" style="flex:1;" onclick="cm()">Отмена</button>
    <button class="btn bprimary" style="flex:1;" onclick="subAddDt()">Добавить</button>
  </div>`);
}
function subAddDt(){
  const n=document.getElementById('pN').value.trim(),a=parseFloat(document.getElementById('pA').value)||0;
  if(!n||a<=0){toast('Заполни имя и сумму');return;}
  S.debtors.push({id:uid(),name:n,amount:a,date:document.getElementById('pDt').value,note:document.getElementById('pNo').value,status:'pending',paid:0});
  save();cm();toast('Добавлено');render();
}
function dtPaid(id){S.debtors=S.debtors.map(d=>d.id==id?{...d,status:'paid',paid:d.amount}:d);save();toast('Отмечено');render();}
function openPartial(id){
  const d=S.debtors.find(x=>x.id==id),rem=d.amount-(d.paid||0);
  modal(`<div class="mtitle">Частичный возврат — ${d.name}</div>
  <div style="text-align:center;font-size:12px;color:var(--muted);margin-bottom:14px;">Ожидаем: <b style="color:var(--sage);">${f(rem)} ₽</b></div>
  <div class="ig"><label class="ilbl">Сколько вернул</label><input type="number" id="pa" placeholder="${rem}"></div>
  <div class="mbtns"><button class="btn bghost" style="flex:1;" onclick="cm()">Отмена</button><button class="btn bprimary" style="flex:1;" onclick="subPartial(${id})">Записать</button></div>`);
}
function subPartial(id){
  const a=parseFloat(document.getElementById('pa').value)||0;if(a<=0){toast('Введи сумму');return;}
  S.debtors=S.debtors.map(d=>{if(d.id!=id)return d;const np=(d.paid||0)+a;return{...d,paid:np,status:np>=d.amount?'paid':'partial'};});
  save();cm();toast(`Записано ${f(a)} ₽`);render();
}
function delDt(id){S.debtors=S.debtors.filter(d=>d.id!=id);save();render();}

// NOTES MODALS
function openAddNote(){
  let selColor=NOTE_COLORS[0];
  modal(`<div class="mtitle">Новая заметка</div>
  <div class="ig"><label class="ilbl">Заголовок</label><input type="text" id="nT" placeholder="Заголовок..."></div>
  <div class="ig"><label class="ilbl">Текст</label><textarea id="nB" placeholder="Текст заметки..."></textarea></div>
  <div class="ig"><label class="ilbl">Цвет метки</label>
    <div class="note-colors">${NOTE_COLORS.map((c,i)=>`<div class="nc ${i===0?'sel':''}" style="background:${c};" onclick="selNC(this,'${c}')"></div>`).join('')}</div>
  </div>
  <div class="ig" style="display:flex;align-items:center;gap:10px;">
    <input type="checkbox" id="nP" style="width:18px;height:18px;flex-shrink:0;">
    <label for="nP" style="font-size:12px;color:var(--text2);font-weight:600;cursor:pointer;">Закрепить заметку</label>
  </div>
  <div class="mbtns">
    <button class="btn bghost" style="flex:1;" onclick="cm()">Отмена</button>
    <button class="btn bprimary" style="flex:1;" onclick="subAddNote()">Сохранить</button>
  </div>`);
}
function selNC(el,color){document.querySelectorAll('.nc').forEach(n=>n.classList.remove('sel'));el.classList.add('sel');el.dataset.color=color;}
function subAddNote(){
  const t=document.getElementById('nT').value.trim(),b=document.getElementById('nB').value.trim();
  const selEl=document.querySelector('.nc.sel');
  const color=selEl?(selEl.dataset.color||selEl.style.backgroundColor):NOTE_COLORS[0];
  const pinned=document.getElementById('nP').checked;
  S.notes.push({id:uid(),title:t,text:b,date:today(),color,pinned});
  save();cm();toast('Заметка сохранена');render();
}
function openNote(id){
  const n=S.notes.find(x=>x.id==id);if(!n)return;
  modal(`<div class="mtitle" style="color:${n.color||'var(--text)'};">${n.title||'Без названия'}</div>
  <div style="font-size:11px;color:var(--muted);text-align:center;margin-bottom:14px;font-weight:600;">${fd(n.date)}${n.pinned?' · 📌 Закреплена':''}</div>
  ${n.text?`<div style="background:var(--card);border-radius:10px;padding:13px;font-size:13px;color:var(--text2);line-height:1.7;white-space:pre-wrap;margin-bottom:4px;">${n.text}</div>`:''}
  <div class="ig"><label class="ilbl">Заголовок</label><input type="text" id="enT" value="${n.title||''}"></div>
  <div class="ig"><label class="ilbl">Текст</label><textarea id="enB">${n.text||''}</textarea></div>
  <div class="mbtns">
    <button class="btn bdanger bsm" onclick="delNote(${id})">Удалить</button>
    <button class="btn bghost" style="flex:1;" onclick="cm()">Закрыть</button>
    <button class="btn bprimary" style="flex:1;" onclick="subEditNote(${id})">Сохранить</button>
  </div>`);
}
function subEditNote(id){
  const t=document.getElementById('enT').value.trim(),b=document.getElementById('enB').value.trim();
  S.notes=S.notes.map(n=>n.id==id?{...n,title:t,text:b}:n);
  save();cm();toast('Сохранено');render();
}
function delNote(id){if(!confirm('Удалить заметку?'))return;S.notes=S.notes.filter(n=>n.id!=id);save();cm();render();}
function togglePin(id){S.notes=S.notes.map(n=>n.id==id?{...n,pinned:!n.pinned}:n);save();toast(S.notes.find(n=>n.id==id)?.pinned?'Закреплено':'Откреплено');render();}

// ─── COMMON ──────────────────────────────────────────
function updFD(id,k,v){S.freeDebts=S.freeDebts.map(d=>d.id==id?{...d,[k]:v}:d);save();}
function delFD(id){S.freeDebts=S.freeDebts.filter(d=>d.id!=id);save();render();}
function updInc(k,v){S.income[k]=parseFloat(v)||0;save();}
function updEx(id,k,v){S.expenses=S.expenses.map(e=>e.id==id?{...e,[k]:k==='amt'?(parseFloat(v)||0):v}:e);save();}
function addEx(){S.expenses.push({id:uid(),name:'Статья',amt:0});save();render();}
function delEx(id){S.expenses=S.expenses.filter(e=>e.id!=id);save();render();}
function setST(p,t){STAB[p]=t;render();}
function clrHist(){if(confirm('Очистить историю?')){S.history=[];save();render();}}
function toast(msg){const el=document.createElement('div');el.className='toast';el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),2700);}

function checkNotif(){
  if(!('Notification' in window))return;
  const d=new Date().getDate(),due=S.credits.filter(c=>c.balance>0&&c.rday===d);
  if(!due.length)return;
  if(Notification.permission==='granted'){due.forEach(c=>new Notification('Платёж сегодня',{body:`${c.name} — ${f(c.payment)} ₽`,tag:`pay-${c.id}`}));}
  else if(Notification.permission!=='denied'){Notification.requestPermission().then(p=>{if(p==='granted')checkNotif();});}
}

if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}
render();
setTimeout(checkNotif,1200);
</script>
