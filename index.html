<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Финансы">
<title>Финансовый дашборд</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0d1117;
  --surface:#13192a;
  --card:#17202f;
  --card2:#1c2538;
  --border:#242d40;
  --border2:#2e3a50;
  --blue:#6b9fff;
  --teal:#4db8c8;
  --amber:#e8a84a;
  --rose:#d4738a;
  --sage:#5cb88a;
  --lavender:#8b8dce;
  --red:#c96060;
  --red-bg:#1e1418;
  --green:#5cb88a;
  --green-bg:#111c16;
  --yellow:#c9a84a;
  --yellow-bg:#1c1810;
  --text:#c8d4e8;
  --text2:#8a9ab8;
  --muted:#4a5a78;
  --nav:60px;
  --safe:env(safe-area-inset-bottom,0px);
  --r:14px;
}
body{font-family:'Manrope',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;}
.app{max-width:420px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
.hdr{padding:48px 18px 14px;border-bottom:1px solid var(--border);background:rgba(13,17,23,.95);backdrop-filter:blur(20px);position:sticky;top:0;z-index:50;}
.hdr-row{display:flex;justify-content:space-between;align-items:flex-end;}
.hdr-lbl{font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:2px;font-weight:600;}
.hdr-title{font-size:20px;font-weight:800;color:var(--text);letter-spacing:-.02em;}
.hdr-debt{text-align:right;}
.hdr-debt-val{font-size:17px;font-weight:700;color:var(--red);}
.content{flex:1;overflow-y:auto;padding:14px 16px calc(var(--nav) + var(--safe) + 14px);}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;background:rgba(13,17,23,.97);backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe);z-index:100;}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:8px 4px;background:none;border:none;cursor:pointer;color:var(--muted);font-size:9px;font-family:inherit;min-height:var(--nav);transition:color .2s;font-weight:600;letter-spacing:.03em;}
.nb.on{color:var(--blue);}
.nb .ic{font-size:20px;line-height:1;margin-bottom:1px;}
.card{background:var(--card);border-radius:var(--r);padding:14px 15px;border:1px solid var(--border);margin-bottom:10px;}
.stl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.stl-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.sgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:10px;}
.sbox{background:var(--surface);border-radius:10px;padding:10px 8px;border:1px solid var(--border);text-align:center;}
.sbox .sl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;font-weight:700;}
.sbox .sv{font-size:11px;font-weight:700;line-height:1.2;}
.badge{display:inline-block;font-size:8px;font-weight:800;padding:3px 8px;border-radius:5px;letter-spacing:.06em;text-transform:uppercase;}
.stabs{display:flex;gap:3px;margin-bottom:12px;background:var(--surface);padding:4px;border-radius:10px;}
.stab{flex:1;padding:7px 4px;border-radius:7px;border:none;background:transparent;color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit;}
.stab.on{background:var(--card2);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.4);}
.li{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.li:last-child{border-bottom:none;padding-bottom:0;}
input,select,textarea{background:var(--surface);border:1px solid var(--border2);border-radius:9px;padding:10px 12px;color:var(--text);font-size:14px;outline:none;width:100%;font-family:inherit;-webkit-appearance:none;appearance:none;transition:border-color .2s;}
input:focus,select:focus{border-color:var(--blue);}
.ig{margin-bottom:10px;}
.ilbl{font-size:11px;color:var(--muted);margin-bottom:5px;display:block;font-weight:600;letter-spacing:.03em;}
.btn{padding:11px 18px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s,transform .1s;letter-spacing:.01em;}
.btn:active{opacity:.8;transform:scale(.98);}
.bprimary{background:var(--blue);color:#0d1117;}
.boutline{background:transparent;border:1px solid var(--border2);color:var(--text2);}
.bsm{padding:7px 13px;font-size:11px;border-radius:8px;}
.bdanger{background:var(--red-bg);color:var(--red);border:1px solid transparent;font-size:11px;}
.bghost{background:var(--surface);color:var(--text2);border:1px solid var(--border);}
.bsage{background:var(--green-bg);color:var(--sage);border:1px solid transparent;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .15s;}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:22px 18px calc(env(safe-area-inset-bottom,0px) + 22px);width:100%;max-width:420px;max-height:88vh;overflow-y:auto;animation:slideUp .2s;border-top:1px solid var(--border2);}
.mtitle{font-size:16px;font-weight:800;margin-bottom:18px;text-align:center;letter-spacing:-.02em;}
.mbtns{display:flex;gap:8px;margin-top:18px;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.pbar{background:var(--border);border-radius:4px;height:4px;overflow:hidden;margin-top:6px;}
.pfill{height:100%;border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.toast{position:fixed;top:72px;left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--border2);border-radius:10px;padding:9px 18px;font-size:12px;font-weight:600;z-index:999;white-space:nowrap;pointer-events:none;animation:toastAnim 2.6s forwards;color:var(--text);box-shadow:0 8px 24px rgba(0,0,0,.4);}
@keyframes toastAnim{0%{opacity:0;transform:translateX(-50%) translateY(-6px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}75%{opacity:1}100%{opacity:0}}
.alert{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;margin-bottom:7px;font-size:12px;font-weight:500;}
.ared{background:var(--red-bg);border:1px solid #c9606033;}
.ayellow{background:var(--yellow-bg);border:1px solid #c9a84a33;}
.titem{display:flex;gap:12px;padding-bottom:16px;position:relative;}
.titem::before{content:'';position:absolute;left:14px;top:30px;bottom:0;width:1px;background:var(--border);}
.titem:last-child::before{display:none;}
.tdot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;z-index:1;}
.tbody{flex:1;padding-top:3px;}
.div{height:1px;background:var(--border);margin:10px 0;}
.row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;}
.rl{font-size:12px;color:var(--text2);}
.rv{font-size:13px;font-weight:700;}
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0;}
.empty{text-align:center;color:var(--muted);font-size:13px;padding:28px;line-height:2.2;font-weight:500;}
</style>
</head>
<body>
<div class="app">
  <header class="hdr">
    <div class="hdr-row">
      <div>
        <div class="hdr-lbl">Дашборд</div>
        <div class="hdr-title" id="htitle">Обзор</div>
      </div>
      <div class="hdr-debt">
        <div class="hdr-lbl" style="text-align:right;">Кредитный долг</div>
        <div class="hdr-debt-val" id="hdebt">—</div>
      </div>
    </div>
  </header>
  <main class="content" id="content"></main>
  <nav class="bnav">
    <button class="nb on" data-t="home"    onclick="go('home')">   <span class="ic">⊙</span>Главная</button>
    <button class="nb"    data-t="debts"   onclick="go('debts')">  <span class="ic">◈</span>Долги</button>
    <button class="nb"    data-t="people"  onclick="go('people')"> <span class="ic">◎</span>Люди</button>
    <button class="nb"    data-t="history" onclick="go('history')"><span class="ic">≡</span>История</button>
    <button class="nb"    data-t="charts"  onclick="go('charts')"> <span class="ic">◫</span>Графики</button>
  </nav>
</div>
<div id="mc"></div>
<script>
const CC=['#6b9fff','#4db8c8','#e8a84a','#d4738a','#5cb88a','#8b8dce'];
const DEF={
  credits:[
    {id:1,name:'Т-банк', balance:128000,rate:25,payment:5500,rday:15,goal:'',color:'#6b9fff'},
    {id:2,name:'Сбер',   balance:61000, rate:19,payment:3200,rday:20,goal:'',color:'#4db8c8'},
    {id:3,name:'Альфа',  balance:57000, rate:21,payment:3000,rday:10,goal:'',color:'#e8a84a'},
    {id:4,name:'Яндекс', balance:30000, rate:22,payment:2000,rday:5, goal:'',color:'#d4738a'},
  ],
  freeDebts:[
    {id:1,name:'Мама',        amount:1700000,urg:'low'},
    {id:2,name:'Общий',       amount:150000, urg:'medium'},
    {id:3,name:'Сбер (б/п)',  amount:63000,  urg:'medium'},
    {id:4,name:'Т-банк (б/п)',amount:136000, urg:'medium'},
    {id:5,name:'Яндекс (б/п)',amount:31000,  urg:'low'},
  ],
  income:{salary:0,card:28000,cash:0,incoming:0},
  expenses:[{id:1,name:'Продукты',amt:0},{id:2,name:'Аренда',amt:0},{id:3,name:'Транспорт',amt:0}],
  history:[],debtors:[],
};
let S=loadState(), TAB='home', STAB={debts:'credits'};
function loadState(){try{const s=localStorage.getItem('fin_v4');if(s)return JSON.parse(s);}catch(e){}return JSON.parse(JSON.stringify(DEF));}
function save(){localStorage.setItem('fin_v4',JSON.stringify(S));}
const f=n=>new Intl.NumberFormat('ru-RU').format(Math.round(n));
const fd=d=>d?new Date(d+'T12:00').toLocaleDateString('ru-RU',{day:'numeric',month:'short',year:'numeric'}):'';
const today=()=>new Date().toISOString().slice(0,10);
const uid=()=>Date.now()+Math.random();
function months(bal,rate,pay){const r=rate/100/12;if(bal<=0)return 0;if(r===0)return Math.ceil(bal/pay);if(pay<=bal*r)return Infinity;return Math.ceil(-Math.log(1-(bal*r)/pay)/Math.log(1+r));}
function prio(rate){if(rate>=25)return{lbl:'Срочно',c:'#c96060',bg:'var(--red-bg)'};if(rate>=18)return{lbl:'Скоро',c:'#c9a84a',bg:'var(--yellow-bg)'};return{lbl:'Не срочно',c:'#5cb88a',bg:'var(--green-bg)'};}
const URG={high:{lbl:'Срочно',c:'#c96060',bg:'var(--red-bg)'},medium:{lbl:'Скоро',c:'#c9a84a',bg:'var(--yellow-bg)'},low:{lbl:'Подождёт',c:'#5cb88a',bg:'var(--green-bg)'}};
function totals(){const cd=S.credits.reduce((s,c)=>s+c.balance,0),fd=S.freeDebts.reduce((s,d)=>s+d.amount,0),py=S.credits.reduce((s,c)=>s+c.payment,0),ic=Object.values(S.income).reduce((s,v)=>s+v,0),ex=S.expenses.reduce((s,e)=>s+e.amt,0),dt=S.debtors.reduce((s,d)=>s+(d.amount-(d.paid||0)),0);return{cd,fd,tot:cd+fd,py,ic,ex,dt,rem:ic-ex-py};}
const TITLES={home:'Обзор',debts:'Мои долги',people:'Люди',history:'История',charts:'Графики'};
function go(t){TAB=t;document.querySelectorAll('.nb').forEach(b=>b.classList.toggle('on',b.dataset.t===t));document.getElementById('htitle').textContent=TITLES[t]||t;render();}
function render(){const T=totals();document.getElementById('hdebt').textContent=`−${f(T.cd)} ₽`;const c=document.getElementById('content');if(TAB==='home')c.innerHTML=rHome(T);if(TAB==='debts')c.innerHTML=rDebts(T);if(TAB==='people')c.innerHTML=rPeople(T);if(TAB==='history')c.innerHTML=rHistory();if(TAB==='charts')c.innerHTML=rCharts(T);}

function rHome(T){
  const now=new Date(),dd=now.getDate();
  const alerts=S.credits.filter(c=>c.balance>0&&c.rday).flatMap(c=>{const diff=c.rday-dd;if(diff===0)return[{cls:'ared',ico:'●',msg:`Сегодня платёж — ${c.name}: ${f(c.payment)} ₽`,id:c.id}];if(diff>0&&diff<=3)return[{cls:'ayellow',ico:'○',msg:`Через ${diff} дн. — ${c.name}`,id:c.id}];if(diff<0&&diff>=-2)return[{cls:'ared',ico:'▲',msg:`Просрочен — ${c.name}`,id:c.id}];return[];});
  const goals=S.credits.filter(c=>c.goal&&c.balance>0).map(c=>{const dl=Math.ceil((new Date(c.goal)-now)/86400000);const mo=months(c.balance,c.rate,c.payment);const ok=isFinite(mo)&&mo*30<=dl+30;const paid=S.history.filter(h=>h.cid===c.id).reduce((s,h)=>s+h.amt,0);const orig=c.balance+paid;const pct=orig>0?Math.round(paid/orig*100):0;return{c,dl,ok,pct};});
  const sorted=[...S.credits].sort((a,b)=>b.rate-a.rate);
  const totInt=S.credits.reduce((s,c)=>s+c.balance*c.rate/100/12,0);
  return`${alerts.length?`<div class="card" style="border-color:#c9606033;"><div class="stl"><div class="stl-dot" style="background:var(--red);"></div>Напоминания</div>${alerts.map(a=>`<div class="alert ${a.cls}"><span style="color:${a.cls==='ared'?'var(--red)':'var(--yellow)'};font-size:10px;">${a.ico}</span><span style="flex:1;color:var(--text2);">${a.msg}</span><button class="btn bprimary bsm" onclick="openPay(${a.id})">Платёж</button></div>`).join('')}</div>`:''}
  <div class="sgrid">
    <div class="sbox"><div class="sl">Кредиты</div><div class="sv" style="color:var(--red);">−${f(T.cd)} ₽</div></div>
    <div class="sbox"><div class="sl">Долги б/п</div><div class="sv" style="color:var(--amber);">−${f(T.fd)} ₽</div></div>
    <div class="sbox"><div class="sl">Мне должны</div><div class="sv" style="color:var(--sage);">+${f(T.dt)} ₽</div></div>
    <div class="sbox"><div class="sl">Доход/мес</div><div class="sv" style="color:var(--teal);">+${f(T.ic)} ₽</div></div>
    <div class="sbox"><div class="sl">Платежи</div><div class="sv" style="color:var(--rose);">−${f(T.py)} ₽</div></div>
    <div class="sbox"><div class="sl">Остаток</div><div class="sv" style="color:${T.rem>=0?'var(--sage)':'var(--red)'};">${T.rem>=0?'+':''}${f(T.rem)} ₽</div></div>
  </div>
  <div class="card" style="background:var(--surface);">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <div><div style="font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.06em;text-transform:uppercase;">Ежемесячно банкам</div><div style="font-size:24px;font-weight:800;color:var(--red);letter-spacing:-.03em;margin-top:3px;">${f(totInt)} ₽</div></div>
      <div style="text-align:right;"><div style="font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.06em;text-transform:uppercase;">В год</div><div style="font-size:17px;font-weight:700;color:var(--amber);margin-top:3px;">${f(totInt*12)} ₽</div></div>
    </div>
  </div>
  ${goals.length?`<div class="card"><div class="stl"><div class="stl-dot" style="background:var(--amber);"></div>Цели</div>${goals.map(g=>`<div style="margin-bottom:14px;"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;"><span style="font-size:13px;font-weight:700;">${g.c.name}</span><span style="font-size:11px;color:${g.ok?'var(--sage)':'var(--red)'};">${g.ok?'В графике':'Не успеваем'}</span></div><div style="font-size:11px;color:var(--muted);margin-bottom:6px;">До ${fd(g.c.goal)} · ${g.dl>0?g.dl+' дн.':'прошло'} · ${g.pct}% погашено</div><div class="pbar"><div class="pfill" style="width:${g.pct}%;background:${g.c.color||'var(--blue)'};"></div></div></div>`).join('')}</div>`:''}
  <div class="card"><div class="stl"><div class="stl-dot" style="background:var(--amber);"></div>Приоритет закрытия</div><div style="font-size:11px;color:var(--muted);margin-bottom:12px;font-weight:500;">Метод лавины — сначала высокий %</div>${sorted.map((c,i)=>{const p=prio(c.rate),mo=months(c.balance,c.rate,c.payment),int=Math.round(c.balance*c.rate/100/12);return`<div class="li"><div style="width:26px;height:26px;border-radius:8px;background:${p.bg};color:${p.c};font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${i+1}</div><div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:700;">${c.name}</div><div style="font-size:11px;color:var(--muted);">${c.rate}% · ${f(c.balance)} ₽ · ${isFinite(mo)?mo+' мес':'∞'}</div></div><div style="text-align:right;flex-shrink:0;"><div style="font-size:11px;color:var(--red);font-weight:600;">−${f(int)}/мес</div><span class="badge" style="background:${p.bg};color:${p.c};margin-top:3px;">${p.lbl}</span></div></div>`;}).join('')}</div>`;
}

function rDebts(T){const s=STAB.debts;return`<div class="stabs"><button class="stab ${s==='credits'?'on':''}" onclick="setST('debts','credits')">Кредиты</button><button class="stab ${s==='free'?'on':''}" onclick="setST('debts','free')">Без %</button><button class="stab ${s==='income'?'on':''}" onclick="setST('debts','income')">Бюджет</button></div>${s==='credits'?rCredits():''}${s==='free'?rFree():''}${s==='income'?rIncome(T):''}`;}

function rCredits(){
  return S.credits.map(c=>{
    const p=prio(c.rate),int=c.balance*c.rate/100/12,prin=Math.max(0,c.payment-int),mo=months(c.balance,c.rate,c.payment),ov=isFinite(mo)?c.payment*mo-c.balance:null;
    const paid=S.history.filter(h=>h.cid===c.id).reduce((s,h)=>s+h.amt,0),orig=c.balance+paid,pct=orig>0?Math.round(paid/orig*100):0;
    return`<div class="card" style="border-left:3px solid ${c.color||'var(--blue)'};">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
        <div><div style="font-size:15px;font-weight:800;">${c.name}</div><span class="badge" style="background:${p.bg};color:${p.c};margin-top:4px;">${p.lbl}</span></div>
        <button onclick="openEditC(${c.id})" style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text2);cursor:pointer;font-size:12px;font-family:inherit;font-weight:600;">Изменить</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px;">
        <div class="sbox"><div class="sl">Остаток</div><div class="sv" style="color:var(--red);">${f(c.balance)} ₽</div></div>
        <div class="sbox"><div class="sl">Ставка</div><div class="sv" style="color:var(--amber);">${c.rate}%</div></div>
        <div class="sbox"><div class="sl">Платёж</div><div class="sv">${f(c.payment)} ₽</div></div>
        <div class="sbox"><div class="sl">Осталось мес.</div><div class="sv" style="color:var(--blue);">${isFinite(mo)?mo:'∞'}</div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px;">
        <div style="background:var(--red-bg);border:1px solid #c9606022;border-radius:10px;padding:10px;text-align:center;"><div style="font-size:8px;color:var(--red);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px;">Банку</div><div style="font-size:13px;font-weight:700;color:var(--red);">${f(int)} ₽</div></div>
        <div style="background:#0e1c1a;border:1px solid #4db8c822;border-radius:10px;padding:10px;text-align:center;"><div style="font-size:8px;color:var(--teal);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px;">Гасится</div><div style="font-size:13px;font-weight:700;color:var(--teal);">${f(prin)} ₽</div></div>
      </div>
      ${ov!==null?`<div style="background:var(--surface);border-radius:9px;padding:9px 12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;"><span style="font-size:11px;color:var(--muted);font-weight:500;">Переплата банку</span><span style="font-size:13px;font-weight:700;color:var(--amber);">${f(ov)} ₽</span></div>`:''}
      ${c.goal?`<div style="margin-bottom:10px;"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:6px;"><span style="color:var(--muted);">Цель: ${fd(c.goal)}</span><span style="color:var(--blue);">${pct}% погашено</span></div><div class="pbar"><div class="pfill" style="width:${pct}%;background:${c.color||'var(--blue)'};"></div></div></div>`:''}
      ${c.payment<=int?`<div style="background:var(--red-bg);border-radius:8px;padding:8px 10px;margin-bottom:10px;color:var(--red);font-size:11px;font-weight:500;border:1px solid #c9606033;">▲ Платёж меньше процентов — долг растёт</div>`:''}
      <button class="btn bprimary" style="width:100%;" onclick="openPay(${c.id})">Внести платёж</button>
    </div>`;
  }).join('')+`<button class="btn boutline" style="width:100%;margin-top:2px;" onclick="openAddC()">+ Добавить кредит</button>`;
}

function rFree(){
  const tot=S.freeDebts.reduce((s,d)=>s+d.amount,0);
  return S.freeDebts.map(d=>{const u=URG[d.urg];return`<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;"><div><div style="font-size:14px;font-weight:700;">${d.name}</div><div style="font-size:16px;color:var(--amber);font-weight:700;margin-top:4px;">${f(d.amount)} ₽</div></div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;"><select onchange="updFD(${d.id},'urg',this.value)" style="width:auto;background:${u.bg};border:1px solid ${u.c}33;border-radius:8px;padding:7px 10px;color:${u.c};font-size:11px;font-weight:700;cursor:pointer;"><option value="high" ${d.urg==='high'?'selected':''}>Срочно</option><option value="medium" ${d.urg==='medium'?'selected':''}>Скоро</option><option value="low" ${d.urg==='low'?'selected':''}>Подождёт</option></select><button onclick="delFD(${d.id})" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px;font-family:inherit;">удалить</button></div></div></div>`;}).join('')
  +`<div class="card"><div class="row"><span class="rl">Итого долгов без %</span><span class="rv" style="color:var(--amber);">−${f(tot)} ₽</span></div></div><button class="btn boutline" style="width:100%;margin-top:2px;" onclick="openAddFD()">+ Добавить долг</button>`;
}

function rIncome(T){
  return`<div class="card"><div class="stl"><div class="stl-dot" style="background:var(--teal);"></div>Доходы в месяц</div>${[['salary','Зарплата'],['card','Карта'],['cash','Наличные'],['incoming','Ожидаемые']].map(([k,l])=>`<div class="ig"><label class="ilbl">${l}</label><input type="number" value="${S.income[k]}" onchange="updInc('${k}',this.value)" placeholder="0"></div>`).join('')}<div class="div"></div><div class="row"><span class="rl">Итого доход</span><span class="rv" style="color:var(--teal);">+${f(T.ic)} ₽</span></div></div>
  <div class="card"><div class="stl"><div class="stl-dot" style="background:var(--rose);"></div>Расходы в месяц</div>${S.expenses.map(e=>`<div style="display:flex;gap:7px;margin-bottom:8px;"><input type="text" value="${e.name}" onchange="updEx(${e.id},'name',this.value)" style="flex:1;"><input type="number" value="${e.amt}" onchange="updEx(${e.id},'amt',this.value)" style="width:110px;text-align:right;"><button onclick="delEx(${e.id})" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:22px;flex-shrink:0;line-height:1;">×</button></div>`).join('')}<button onclick="addEx()" style="width:100%;padding:9px;background:transparent;border:1px dashed var(--border2);border-radius:9px;color:var(--muted);cursor:pointer;font-size:12px;font-family:inherit;font-weight:600;margin-top:4px;">+ Добавить статью</button></div>
  <div class="card" style="border-color:var(--border2);"><div class="stl"><div class="stl-dot" style="background:var(--lavender);"></div>Баланс месяца</div><div class="row"><span class="rl">Доход</span><span class="rv" style="color:var(--teal);">+${f(T.ic)} ₽</span></div><div class="row"><span class="rl">Расходы</span><span class="rv" style="color:var(--rose);">−${f(T.ex)} ₽</span></div><div class="row"><span class="rl">Платежи по кредитам</span><span class="rv" style="color:var(--red);">−${f(T.py)} ₽</span></div><div class="div"></div><div class="row"><span style="font-size:14px;font-weight:700;">Остаток</span><span class="rv" style="font-size:20px;color:${T.rem>=0?'var(--sage)':'var(--red)'};">${T.rem>=0?'+':''}${f(T.rem)} ₽</span></div>${T.rem<0?`<div style="background:var(--red-bg);border-radius:9px;padding:10px;margin-top:10px;color:var(--red);font-size:12px;font-weight:500;border:1px solid #c9606022;">Расходы превышают доходы на ${f(Math.abs(T.rem))} ₽</div>`:''}</div>`;
}

function rPeople(T){
  const dt=S.debtors,tot=T.dt,avC=['#6b9fff','#4db8c8','#e8a84a','#d4738a','#5cb88a','#8b8dce'];
  return`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;"><div class="stl" style="margin-bottom:0;"><div class="stl-dot" style="background:var(--sage);"></div>Мне должны</div><button class="btn bprimary bsm" onclick="openAddDt()">+ Добавить</button></div>
  ${dt.length===0?`<div class="empty">Никто не должен<br><span style="font-size:11px;color:var(--muted);">Нажми «+ Добавить»</span></div>`:''}
  ${dt.map((d,i)=>{const rem=d.amount-(d.paid||0),pct=Math.round((d.paid||0)/d.amount*100),avc=avC[i%avC.length];return`<div class="li" style="align-items:flex-start;padding:14px 0;"><div class="av" style="background:${avc}18;color:${avc};">${d.name.charAt(0).toUpperCase()}</div><div style="flex:1;min-width:0;"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px;"><span style="font-size:14px;font-weight:700;">${d.name}</span><span style="font-size:14px;font-weight:700;color:${d.status==='paid'?'var(--muted)':'var(--sage)'};">${d.status==='paid'?'Вернул':'+'+f(rem)+' ₽'}</span></div>${d.note?`<div style="font-size:11px;color:var(--muted);margin-bottom:3px;">${d.note}</div>`:''}<div style="font-size:11px;color:var(--muted);">${fd(d.date)} · ${f(d.amount)} ₽ всего</div>${(d.paid||0)>0?`<div style="margin-top:7px;"><div class="pbar"><div class="pfill" style="width:${pct}%;background:var(--sage);"></div></div><div style="font-size:10px;color:var(--muted);margin-top:3px;font-weight:600;">Вернул ${f(d.paid||0)} из ${f(d.amount)} ₽</div></div>`:''}<div style="display:flex;gap:6px;margin-top:9px;flex-wrap:wrap;">${d.status!=='paid'?`<button class="btn bsage bsm" onclick="dtPaid(${d.id})">Вернул всё</button>`:`<span class="badge" style="background:var(--green-bg);color:var(--sage);">Вернул</span>`}${d.status!=='paid'?`<button class="btn bghost bsm" onclick="openPartial(${d.id})">Частично</button>`:''}<button class="btn bdanger bsm" onclick="delDt(${d.id})">Удалить</button></div></div></div>`;}).join('')}
  ${dt.length>0?`<div class="div"></div><div class="row"><span class="rl">Итого мне должны</span><span class="rv" style="color:var(--sage);font-size:16px;">+${f(tot)} ₽</span></div>`:''}</div>`;
}

function rHistory(){
  const hist=[...S.history].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const totPaid=hist.reduce((s,h)=>s+h.amt,0);
  return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding:0 2px;"><span style="font-size:12px;color:var(--muted);font-weight:600;">Всего внесено</span><span style="font-size:18px;font-weight:800;color:var(--blue);">${f(totPaid)} ₽</span></div>
  ${hist.length===0?`<div class="card"><div class="empty">История пуста<br><span style="font-size:11px;">Платежи появятся здесь</span></div></div>`:
  `<div class="card">${hist.map(h=>{const tc=h.type==='payment'?'var(--blue)':'var(--amber)';return`<div class="titem"><div class="tdot" style="background:${h.type==='payment'?'#0f1b2e':'#1c180d'};color:${tc};">◈</div><div class="tbody"><div style="font-size:13px;font-weight:700;">${h.cn}</div><div style="font-size:15px;font-weight:800;color:${tc};margin-top:1px;">−${f(h.amt)} ₽</div>${h.note?`<div style="font-size:11px;color:var(--muted);margin-top:2px;">${h.note}</div>`:''}<div style="font-size:11px;color:var(--muted);margin-top:2px;font-weight:500;">${fd(h.date)}</div></div></div>`;}).join('')}</div>
  <button class="btn bdanger bsm" style="width:100%;margin-top:6px;" onclick="clrHist()">Очистить историю</button>`}`;
}

function rCharts(T){
  const cr=S.credits.filter(c=>c.balance>0),tot=cr.reduce((s,c)=>s+c.balance,0);
  let cumP=0,parts='';
  cr.forEach((c,i)=>{const p=(c.balance/tot)*100;parts+=`${c.color||CC[i]} ${cumP}% ${cumP+p}%,`;cumP+=p;});
  if(parts)parts=parts.slice(0,-1);
  let rem=cr.map(c=>({...c}));const fc=[];
  for(let m=0;m<=60;m++){const t=rem.reduce((s,c)=>s+Math.max(0,c.balance),0);fc.push(t);if(t<=0)break;rem=rem.map(c=>{if(c.balance<=0)return c;const i=c.balance*c.rate/100/12;return{...c,balance:Math.max(0,c.balance-Math.max(0,c.payment-i))};});}
  const fcMo=fc.length-1,svgW=340,svgH=100,mxF=Math.max(...fc,1);
  const pts=fc.map((v,i)=>{const x=(i/(Math.max(fc.length-1,1)))*(svgW-20)+10,y=svgH-10-((v/mxF)*(svgH-20));return`${x},${y}`;}).join(' ');
  const totInt=cr.reduce((s,c)=>s+c.balance*c.rate/100/12,0),maxP=Math.max(...cr.map(c=>c.payment),1);
  return`
  <div class="card"><div class="stl"><div class="stl-dot" style="background:var(--blue);"></div>Структура долга</div>
    <div style="display:flex;align-items:center;gap:16px;">
      <div style="width:100px;height:100px;border-radius:50%;background:conic-gradient(${parts||'var(--border) 0% 100%'});flex-shrink:0;position:relative;"><div style="position:absolute;inset:16px;border-radius:50%;background:var(--card);"></div></div>
      <div style="flex:1;display:flex;flex-direction:column;gap:8px;">${cr.map((c,i)=>{const p=tot>0?Math.round(c.balance/tot*100):0;return`<div style="display:flex;align-items:center;justify-content:space-between;"><div style="display:flex;align-items:center;gap:7px;font-size:12px;"><div style="width:8px;height:8px;border-radius:2px;background:${c.color||CC[i]};flex-shrink:0;"></div><span style="color:var(--text2);font-weight:600;">${c.name}</span></div><span style="font-size:12px;font-weight:700;">${p}%</span></div>`;}).join('')}</div>
    </div>
    <div style="margin-top:12px;font-size:12px;color:var(--muted);font-weight:600;text-align:center;">Итого: ${f(T.cd)} ₽</div>
  </div>
  <div class="card"><div class="stl"><div class="stl-dot" style="background:var(--lavender);"></div>Прогноз погашения</div>
    <svg width="100%" viewBox="0 0 ${svgW} ${svgH}" style="overflow:visible;display:block;margin-bottom:8px;"><defs><linearGradient id="gl" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#6b9fff" stop-opacity=".18"/><stop offset="100%" stop-color="#6b9fff" stop-opacity="0"/></linearGradient></defs><polygon points="10,${svgH-10} ${pts} ${(fc.length>1?1:0)*(svgW-20)+10},${svgH-10}" fill="url(#gl)"/><polyline points="${pts}" fill="none" stroke="var(--blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);font-weight:600;"><span>${f(fc[0]||0)} ₽</span><span style="color:var(--sage);">0 ₽</span></div>
    <div style="text-align:center;margin-top:10px;background:var(--surface);border-radius:9px;padding:12px;"><div style="font-size:11px;color:var(--muted);font-weight:600;">Без кредитов через</div><div style="font-size:22px;font-weight:800;color:var(--blue);letter-spacing:-.02em;margin-top:2px;">${fcMo} мес.</div><div style="font-size:11px;color:var(--muted);margin-top:1px;">${Math.floor(fcMo/12)} лет ${fcMo%12} мес.</div></div>
  </div>
  <div class="card"><div class="stl"><div class="stl-dot" style="background:var(--red);"></div>Состав платежа</div>
    <div style="display:flex;align-items:flex-end;gap:10px;height:110px;margin-bottom:8px;">${cr.map((c,i)=>{const int=c.balance*c.rate/100/12,pr=Math.max(0,c.payment-int),th=(c.payment/maxP)*100,ih=(int/c.payment)*100;return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end;"><div style="width:100%;border-radius:6px 6px 0 0;display:flex;flex-direction:column-reverse;overflow:hidden;height:${th}%;min-height:4px;"><div style="height:${100-ih}%;background:${c.color||CC[i]};opacity:.65;"></div><div style="height:${ih}%;background:var(--red);opacity:.55;"></div></div><div style="font-size:9px;color:var(--muted);text-align:center;font-weight:700;">${c.name}</div></div>`;}).join('')}</div>
    <div style="display:flex;gap:14px;margin-top:4px;"><div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);font-weight:600;"><div style="width:8px;height:8px;background:var(--red);opacity:.55;border-radius:2px;"></div>Банку</div><div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);font-weight:600;"><div style="width:8px;height:8px;background:var(--blue);opacity:.65;border-radius:2px;"></div>Гашение</div></div>
  </div>
  <div class="card"><div class="stl"><div class="stl-dot" style="background:var(--amber);"></div>Ежемесячно банкам</div>
    ${cr.map((c,i)=>{const int=Math.round(c.balance*c.rate/100/12),bw=totInt>0?(int/totInt)*100:0;return`<div style="margin-bottom:12px;"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;"><span style="font-weight:600;">${c.name} <span style="color:var(--muted);">${c.rate}%</span></span><span style="color:var(--red);font-weight:700;">−${f(int)}/мес</span></div><div style="background:var(--border);border-radius:4px;height:5px;overflow:hidden;"><div style="width:${bw}%;height:100%;background:${c.color||CC[i]};border-radius:4px;opacity:.75;"></div></div></div>`;}).join('')}
    <div style="background:var(--surface);border-radius:10px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;"><span style="font-size:12px;color:var(--muted);font-weight:600;">Итого процентов/мес</span><span style="font-size:17px;font-weight:800;color:var(--amber);">${f(totInt)} ₽</span></div>
  </div>`;
}

function modal(html){document.getElementById('mc').innerHTML=`<div class="overlay" onclick="if(event.target===this)cm()"><div class="modal">${html}</div></div>`;}
function cm(){document.getElementById('mc').innerHTML='';}
function openPay(id){const c=S.credits.find(x=>x.id==id);if(!c)return;modal(`<div class="mtitle">Платёж — ${c.name}</div><div style="text-align:center;font-size:13px;color:var(--muted);margin-bottom:18px;font-weight:500;">Остаток: <b style="color:var(--red);">${f(c.balance)} ₽</b></div><div class="ig"><label class="ilbl">Сумма</label><input type="number" id="pAmt" value="${c.payment}"></div><div class="ig"><label class="ilbl">Дата</label><input type="date" id="pDate" value="${today()}"></div><div class="ig"><label class="ilbl">Заметка</label><input type="text" id="pNote" placeholder="Необязательно..."></div><div class="mbtns"><button class="btn bghost" style="flex:1;" onclick="cm()">Отмена</button><button class="btn bprimary" style="flex:1;" onclick="subPay(${id})">Записать</button></div>`);}
function subPay(id){const amt=parseFloat(document.getElementById('pAmt').value)||0,dt=document.getElementById('pDate').value,note=document.getElementById('pNote').value;if(amt<=0){toast('Введи сумму');return;}const c=S.credits.find(x=>x.id==id);S.credits=S.credits.map(x=>x.id==id?{...x,balance:Math.max(0,x.balance-amt)}:x);S.history.push({id:uid(),date:dt,cid:id,cn:c.name,amt,note,type:'payment'});save();cm();toast(`Платёж ${f(amt)} ₽ записан`);render();}
function openAddC(){modal(`<div class="mtitle">Новый кредит</div><div class="ig"><label class="ilbl">Название</label><input type="text" id="cN" placeholder="Т-банк"></div><div class="ig"><label class="ilbl">Остаток (₽)</label><input type="number" id="cB" placeholder="100000"></div><div class="ig"><label class="ilbl">Ставка (%)</label><input type="number" id="cR" placeholder="20"></div><div class="ig"><label class="ilbl">Ежемесячный платёж (₽)</label><input type="number" id="cP" placeholder="5000"></div><div class="ig"><label class="ilbl">День напоминания (1–31)</label><input type="number" id="cD" placeholder="15" min="1" max="31"></div><div class="ig"><label class="ilbl">Цель — закрыть к</label><input type="date" id="cG"></div><div class="mbtns"><button class="btn bghost" style="flex:1;" onclick="cm()">Отмена</button><button class="btn bprimary" style="flex:1;" onclick="subAddC()">Добавить</button></div>`);}
function subAddC(){const n=document.getElementById('cN').value.trim(),b=parseFloat(document.getElementById('cB').value)||0,r=parseFloat(document.getElementById('cR').value)||0,p=parseFloat(document.getElementById('cP').value)||0,d=parseInt(document.getElementById('cD').value)||0,g=document.getElementById('cG').value;if(!n||b<=0){toast('Заполни название и сумму');return;}S.credits.push({id:uid(),name:n,balance:b,rate:r,payment:p,rday:d,goal:g,color:CC[S.credits.length%CC.length]});save();cm();toast('Кредит добавлен');render();}
function openEditC(id){const c=S.credits.find(x=>x.id==id);if(!c)return;modal(`<div class="mtitle">Изменить — ${c.name}</div><div class="ig"><label class="ilbl">Название</label><input type="text" id="cN" value="${c.name}"></div><div class="ig"><label class="ilbl">Остаток (₽)</label><input type="number" id="cB" value="${c.balance}"></div><div class="ig"><label class="ilbl">Ставка (%)</label><input type="number" id="cR" value="${c.rate}"></div><div class="ig"><label class="ilbl">Ежемесячный платёж (₽)</label><input type="number" id="cP" value="${c.payment}"></div><div class="ig"><label class="ilbl">День напоминания</label><input type="number" id="cD" value="${c.rday||''}" min="1" max="31"></div><div class="ig"><label class="ilbl">Цель — закрыть к</label><input type="date" id="cG" value="${c.goal||''}"></div><div class="mbtns"><button class="btn bdanger bsm" onclick="delC(${id})">Удалить</button><button class="btn bghost" style="flex:1;" onclick="cm()">Отмена</button><button class="btn bprimary" style="flex:1;" onclick="subEditC(${id})">Сохранить</button></div>`);}
function subEditC(id){const n=document.getElementById('cN').value.trim(),b=parseFloat(document.getElementById('cB').value)||0,r=parseFloat(document.getElementById('cR').value)||0,p=parseFloat(document.getElementById('cP').value)||0,d=parseInt(document.getElementById('cD').value)||0,g=document.getElementById('cG').value;S.credits=S.credits.map(x=>x.id==id?{...x,name:n,balance:b,rate:r,payment:p,rday:d,goal:g}:x);save();cm();toast('Сохранено');render();}
function delC(id){if(!confirm('Удалить кредит?'))return;S.credits=S.credits.filter(x=>x.id!=id);save();cm();render();}
function openAddFD(){modal(`<div class="mtitle">Долг без процентов</div><div class="ig"><label class="ilbl">Кому должен</label><input type="text" id="dN" placeholder="Мама"></div><div class="ig"><label class="ilbl">Сумма (₽)</label><input type="number" id="dA" placeholder="50000"></div><div class="ig"><label class="ilbl">Срочность</label><select id="dU"><option value="high">Срочно</option><option value="medium" selected>Скоро</option><option value="low">Подождёт</option></select></div><div class="mbtns"><button class="btn bghost" style="flex:1;" onclick="cm()">Отмена</button><button class="btn bprimary" style="flex:1;" onclick="subAddFD()">Добавить</button></div>`);}
function subAddFD(){const n=document.getElementById('dN').value.trim(),a=parseFloat(document.getElementById('dA').value)||0;if(!n||a<=0){toast('Заполни поля');return;}S.freeDebts.push({id:uid(),name:n,amount:a,urg:document.getElementById('dU').value});save();cm();toast('Добавлено');render();}
function openAddDt(){modal(`<div class="mtitle">Кто мне должен</div><div class="ig"><label class="ilbl">Имя</label><input type="text" id="pN" placeholder="Геворг"></div><div class="ig"><label class="ilbl">Сумма (₽)</label><input type="number" id="pA" placeholder="10000"></div><div class="ig"><label class="ilbl">Дата займа</label><input type="date" id="pDt" value="${today()}"></div><div class="ig"><label class="ilbl">Заметка</label><input type="text" id="pNo" placeholder="За что дал деньги"></div><div class="mbtns"><button class="btn bghost" style="flex:1;" onclick="cm()">Отмена</button><button class="btn bprimary" style="flex:1;" onclick="subAddDt()">Добавить</button></div>`);}
function subAddDt(){const n=document.getElementById('pN').value.trim(),a=parseFloat(document.getElementById('pA').value)||0;if(!n||a<=0){toast('Заполни имя и сумму');return;}S.debtors.push({id:uid(),name:n,amount:a,date:document.getElementById('pDt').value,note:document.getElementById('pNo').value,status:'pending',paid:0});save();cm();toast('Добавлено');render();}
function dtPaid(id){S.debtors=S.debtors.map(d=>d.id==id?{...d,status:'paid',paid:d.amount}:d);save();toast('Отмечено как возвращено');render();}
function openPartial(id){const d=S.debtors.find(x=>x.id==id),rem=d.amount-(d.paid||0);modal(`<div class="mtitle">Частичный возврат — ${d.name}</div><div style="text-align:center;font-size:13px;color:var(--muted);margin-bottom:18px;">Ожидаем: <b style="color:var(--sage);">${f(rem)} ₽</b></div><div class="ig"><label class="ilbl">Сколько вернул</label><input type="number" id="pa" placeholder="${rem}"></div><div class="mbtns"><button class="btn bghost" style="flex:1;" onclick="cm()">Отмена</button><button class="btn bprimary" style="flex:1;" onclick="subPartial(${id})">Записать</button></div>`);}
function subPartial(id){const a=parseFloat(document.getElementById('pa').value)||0;if(a<=0){toast('Введи сумму');return;}S.debtors=S.debtors.map(d=>{if(d.id!=id)return d;const np=(d.paid||0)+a;return{...d,paid:np,status:np>=d.amount?'paid':'partial'};});save();cm();toast(`Записано ${f(a)} ₽`);render();}
function delDt(id){S.debtors=S.debtors.filter(d=>d.id!=id);save();render();}
function updFD(id,k,v){S.freeDebts=S.freeDebts.map(d=>d.id==id?{...d,[k]:v}:d);save();}
function delFD(id){S.freeDebts=S.freeDebts.filter(d=>d.id!=id);save();render();}
function updInc(k,v){S.income[k]=parseFloat(v)||0;save();}
function updEx(id,k,v){S.expenses=S.expenses.map(e=>e.id==id?{...e,[k]:k==='amt'?(parseFloat(v)||0):v}:e);save();}
function addEx(){S.expenses.push({id:uid(),name:'Новая статья',amt:0});save();render();}
function delEx(id){S.expenses=S.expenses.filter(e=>e.id!=id);save();render();}
function setST(p,t){STAB[p]=t;render();}
function clrHist(){if(confirm('Очистить историю?')){S.history=[];save();render();}}
function toast(msg){const el=document.createElement('div');el.className='toast';el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),2700);}
function checkNotif(){if(!('Notification' in window))return;const d=new Date().getDate(),due=S.credits.filter(c=>c.balance>0&&c.rday===d);if(!due.length)return;if(Notification.permission==='granted'){due.forEach(c=>new Notification('Платёж сегодня',{body:`${c.name} — ${f(c.payment)} ₽`,tag:`pay-${c.id}`}));}else if(Notification.permission!=='denied'){Notification.requestPermission().then(p=>{if(p==='granted')checkNotif();});}}
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}
render();
setTimeout(checkNotif,1200);
</script>
</body>
</html>
